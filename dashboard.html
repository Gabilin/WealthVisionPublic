<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WealthVision — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="proto-shell.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    .device-frame {
      width: 393px; height: 852px; border-radius: 47px; overflow: hidden;
      position: relative; background: #0c0c0e;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 0 25px 60px rgba(0,0,0,0.55);
    }

    /* Today's lesson — flat Longview card (Learn domain = violet accents) */
    .hero {
      position: relative;
      border-radius: 16px;
      padding: 18px;
      margin-top: 20px;
      background: var(--surface);
      border: 1px solid var(--hairline);
      overflow: hidden;
    }
    .hero-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase;
      color: #9c4dff;
    }
    .hero-lesson { display: flex; align-items: baseline; gap: 8px; margin-top: 10px; }
    .hero-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px; font-weight: 600; color: #c9a6ff;
      background: rgba(156,77,255,0.14); border-radius: 7px; padding: 2px 8px;
    }
    .hero-title {
      font-size: 20px; font-weight: 700; letter-spacing: -0.01em; color: var(--text-hi);
      margin-top: 12px; line-height: 1.2;
    }
    .hero-meta { font-size: 12.5px; color: var(--text-mid); margin-top: 6px; }
    .hero-bar { margin-top: 16px; height: 6px; border-radius: 99px; background: rgba(255,255,255,0.07); overflow: hidden; }
    .hero-bar > i { display: block; height: 100%; border-radius: 99px; background: var(--green); }
    .hero-cta {
      margin-top: 16px; width: 100%; border: none; cursor: pointer;
      background: var(--green); color: #04201b; font-weight: 700; font-size: 15px;
      padding: 13px; border-radius: 12px; letter-spacing: -0.01em;
      transition: transform 140ms ease, filter 140ms ease;
    }
    .hero-cta:hover { filter: brightness(1.06); }
    .hero-cta:active { transform: scale(0.98); }

    /* ── Floating goal carousel — slides sit directly on the app gradient (no card) ── */
    .goal-carousel { margin: 0 -18px; }
    .goal-track {
      display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .goal-track::-webkit-scrollbar { height: 0; width: 0; }
    .goal-hero {
      flex: 0 0 100%; width: 100%; scroll-snap-align: center; position: relative;
      display: block; border: none; background: transparent;
      font-family: inherit; color: inherit; cursor: pointer;
      text-align: center; padding: 16px 26px 10px;
      transition: transform 140ms ease;
    }
    .goal-hero:active { transform: scale(0.99); }
    .goal-hero.is-add { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .goal-dots { display: flex; justify-content: center; gap: 6px; height: 6px; margin-top: 6px; }
    .goal-dot { width: 6px; height: 6px; border-radius: 99px; background: rgba(255,255,255,0.18);
      transition: width 240ms cubic-bezier(0.16,1,0.3,1), background 240ms ease; }
    .goal-dot.active { width: 18px; background: var(--green); }
    .gh-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-lo); }
    .gh-name { font-size: 14px; font-weight: 600; color: var(--text-mid); margin-top: 10px; letter-spacing: 0; }
    .gh-amount { font-family: 'IBM Plex Mono', monospace; font-size: 42px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-hi);
      margin-top: 8px; line-height: 1; }
    .gh-progress { max-width: 250px; margin: 16px auto 0; }
    .gh-bar { height: 6px; border-radius: 99px; background: rgba(255,255,255,0.07); overflow: hidden; }
    .gh-bar > i { display: block; height: 100%; border-radius: 99px;
      background: var(--green);
      transition: width 800ms cubic-bezier(0.16,1,0.3,1); }
    .gh-meta { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-mid); margin-top: 10px; }

    /* per-goal action buttons (top-right of each slide) */
    .gh-tools { position: absolute; top: 6px; right: 22px; display: flex; gap: 8px; z-index: 2; }
    .gh-iconbtn { width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center; color: var(--text-hi); font-family: inherit;
      background: var(--surface);
      border: 1px solid var(--hairline);
      transition: transform 140ms ease, background 140ms ease; text-decoration: none; }
    .gh-iconbtn:active { transform: scale(0.9); }
    .gh-iconbtn:hover { background: var(--surface-h); }
    .gh-iconbtn svg { width: 18px; height: 18px; }
    .gh-iconbtn.sim { color: #04201b; border: none;
      background: var(--green); }
    .gh-iconbtn.sim:hover { filter: brightness(1.06); background: var(--green); }

    /* inline goal stats grid */
    .gh-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 18px auto 0; max-width: 300px; text-align: left; }
    .gh-stat { border-radius: 12px; padding: 11px 13px;
      background: var(--surface);
      border: 1px solid var(--hairline); }
    .gh-stat .k { font-size: 11px; font-weight: 500; color: var(--text-mid); letter-spacing: 0.01em; }
    .gh-stat .v { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; color: var(--text-hi); margin-top: 5px;
      letter-spacing: -0.01em; }

    .gh-pill {
      display: inline-flex; align-items: center; gap: 7px; margin-top: 16px;
      padding: 9px 16px; border-radius: 999px; font-size: 13px; font-weight: 600; color: var(--text-hi);
      background: var(--surface);
      border: 1px solid var(--hairline);
    }
    .gh-pill svg { width: 15px; height: 15px; }

    /* floating goal — empty / suggestion / add-goal state */
    .gh-emoji { width: 56px; height: 56px; margin: 0 auto 14px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(34,171,148,0.12);
      color: var(--green); border: 1px solid rgba(34,171,148,0.26); }
    .gh-emoji svg { width: 28px; height: 28px; }
    .gh-empty-title { font-size: 22px; font-weight: 700; color: var(--text-hi); letter-spacing: -0.01em; margin-top: 4px; }
    .gh-empty-sub { font-size: 13px; color: var(--text-mid); margin: 8px auto 0; max-width: 280px; line-height: 1.45; }
    .gh-pill-cta { background: var(--green); color: #04201b; border: none; font-weight: 700; }

    /* horizontal strips */
    .h-strip { display: flex; gap: 12px; overflow-x: auto; padding: 2px 0 4px; scroll-snap-type: x mandatory; }
    .h-strip::-webkit-scrollbar { height: 0; }


    .tool-card {
      flex: 0 0 auto; width: 166px; scroll-snap-align: start; text-decoration: none;
      border-radius: 14px; padding: 15px; position: relative; overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--hairline);
      transition: background 140ms ease, border-color 140ms ease;
    }
    .tool-card:hover { background: var(--surface-h); border-color: var(--hairline-2); }
    .tool-card .ic { width: 38px; height: 38px; border-radius: 11px; display: flex; align-items: center; justify-content: center;
      background: rgba(var(--accent-rgb),0.14); color: var(--accent); margin-bottom: 12px; }
    .tool-card .ic svg { width: 21px; height: 21px; }
    .tool-card .t { font-size: 14px; font-weight: 600; color: var(--text-hi); letter-spacing: -0.01em; }
    .tool-card .d { font-size: 11.5px; color: var(--text-mid); margin-top: 4px; line-height: 1.35; }
    .tool-card .wv-badge-new { position: absolute; top: 13px; right: 13px; }

    /* ── Payday routine check-in ── */
    .pd-card { position: relative; border-radius: 16px; padding: 15px 16px 14px; margin-bottom: 18px;
      background: var(--surface); border: 1px solid var(--hairline); overflow: hidden; }
    .pd-card.due { border-color: rgba(var(--accent-rgb),0.34);
      background: linear-gradient(180deg, rgba(var(--accent-rgb),0.07), rgba(var(--accent-rgb),0) 62%), var(--surface); }
    .pd-top { display: flex; align-items: center; gap: 9px; }
    .pd-ic { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
      background: rgba(var(--accent-rgb),0.16); color: var(--accent); flex-shrink: 0; }
    .pd-ic svg { width: 19px; height: 19px; }
    .pd-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
    .pd-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-left: auto; animation: pdPulse 2s infinite; }
    @keyframes pdPulse { 0% { box-shadow: 0 0 0 0 rgba(var(--accent-rgb),0.5); } 70% { box-shadow: 0 0 0 7px rgba(var(--accent-rgb),0); } 100% { box-shadow: 0 0 0 0 rgba(var(--accent-rgb),0); } }
    .pd-title { font-size: 16px; font-weight: 700; color: var(--text-hi); letter-spacing: -0.01em; margin-top: 11px; }
    .pd-sub { font-size: 12.5px; color: var(--text-mid); margin-top: 4px; line-height: 1.45; }
    .pd-sub b { color: var(--text-hi); font-weight: 700; }
    .pd-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .pd-chip { font-size: 11.5px; padding: 5px 9px; border-radius: 8px; background: var(--surface-2); border: 1px solid var(--hairline); }
    .pd-chip .pl { color: var(--text-mid); margin-right: 5px; }
    .pd-chip b { font-family: 'IBM Plex Mono', monospace; font-weight: 600; color: var(--text-hi); }
    .pd-actions { display: flex; gap: 8px; margin-top: 14px; }
    .pd-btn { border: none; cursor: pointer; font-family: inherit; font-weight: 700; font-size: 14px;
      padding: 12px; border-radius: 11px; letter-spacing: -0.01em; text-decoration: none;
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      transition: transform 140ms ease, filter 140ms ease; }
    .pd-btn:active { transform: scale(0.98); }
    .pd-btn svg { width: 16px; height: 16px; }
    .pd-primary { flex: 1; background: var(--green); color: #04201b; }
    .pd-primary:hover { filter: brightness(1.06); }
    .pd-ghost { flex: 0 0 auto; background: var(--surface-2); color: var(--text-mid); border: 1px solid var(--hairline); }
    .pd-ghost:hover { color: var(--text-hi); }
    .pd-done { display: flex; align-items: center; gap: 11px; }
    .pd-check { width: 30px; height: 30px; border-radius: 50%; background: rgba(var(--green-rgb),0.16); color: var(--green);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .pd-check svg { width: 16px; height: 16px; }
    .pd-done-txt { flex: 1; min-width: 0; }
    .pd-done-title { font-size: 13.5px; font-weight: 700; color: var(--text-hi); }
    .pd-done-sub { font-size: 12px; color: var(--text-mid); margin-top: 2px; }
    .pd-undo { background: none; border: none; cursor: pointer; font-family: inherit; color: var(--text-mid); font-size: 12px; font-weight: 600; padding: 4px; }
    .pd-undo:hover { color: var(--text-hi); }

    /* ── Goal contribution check-in (amount entry) ── */
    .gc-entry { display: flex; align-items: stretch; gap: 8px; margin-top: 13px; width: 100%; }
    .gc-field { flex: 1; min-width: 0; display: flex; align-items: center; gap: 2px; padding: 0 13px; border-radius: 11px;
      background: var(--surface-2); border: 1px solid var(--hairline);
      transition: border-color 140ms ease, box-shadow 140ms ease; }
    .gc-field:focus-within { border-color: rgba(var(--accent-rgb),0.55); box-shadow: 0 0 0 3px rgba(var(--accent-rgb),0.14); }
    .gc-cur { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 600; color: var(--text-mid); }
    .gc-input { flex: 1; min-width: 0; border: none; background: none; outline: none; font-family: 'IBM Plex Mono', monospace;
      font-size: 18px; font-weight: 600; color: var(--text-hi); padding: 12px 0; letter-spacing: -0.01em; -moz-appearance: textfield; }
    .gc-input::-webkit-outer-spin-button, .gc-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .gc-log { flex: 0 0 auto; border: none; cursor: pointer; font-family: inherit; font-weight: 700; font-size: 14px;
      padding: 0 18px; border-radius: 11px; background: var(--green); color: #04201b; letter-spacing: -0.01em;
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      transition: transform 140ms ease, filter 140ms ease; }
    .gc-log:hover { filter: brightness(1.06); }
    .gc-log:active { transform: scale(0.98); }
    .gc-log svg { width: 16px; height: 16px; }
    .gc-hint { font-size: 11.5px; color: var(--text-mid); margin-top: 9px; line-height: 1.4; }
    .gc-hint b { color: var(--text-hi); font-weight: 700; }
  </style>
</head>
<body data-wv-tab="home">
  <div class="device-frame">
    <div class="wv-hub">
      <div class="wv-top">
        <div>
          <div class="wv-hello">Welcome back</div>
          <div class="wv-page-title" id="greeting">Good evening</div>
        </div>
      </div>

      <div class="wv-scroll">
        <div id="paydayReminder"></div>
        <div id="goalCheckin"></div>
        <div class="goal-carousel" id="goalCarousel">
          <div class="goal-track" id="goalTrack"></div>
          <div class="goal-dots" id="goalDots"></div>
        </div>

        <section class="hero">
          <div class="hero-eyebrow">Today's lesson</div>
          <div class="hero-lesson"><span class="hero-num" id="heroNum">1</span></div>
          <div class="hero-title" id="heroTitle">Inflation</div>
          <div class="hero-meta" id="heroMeta">3 min · Learning Academy</div>
          <div class="hero-bar"><i id="heroBar" style="width:0%"></i></div>
          <button class="hero-cta" id="heroCta">Continue learning</button>
        </section>

        <div class="wv-section-head">
          <div class="wv-section-title">Fresh tools</div>
          <a class="wv-see-all" href="tools.html">See all</a>
        </div>
        <div class="h-strip" id="toolStrip"></div>
      </div>
    </div>
  </div>

  <script src="proto-shell.js"></script>
  <script>
    (function () {
      var S = window.WVShell;
      var st = S.getState();
      var next = S.nextLesson(st) || S.LESSONS[S.LESSONS.length - 1];
      var nextIdx = S.LESSONS.findIndex(function (l) { return l.file === next.file; });

      // Time-aware greeting (no login, so no name)
      var hr = new Date().getHours();
      document.getElementById('greeting').textContent =
        hr < 12 ? 'Good morning' : (hr < 18 ? 'Good afternoon' : 'Good evening');

      // ── Payday routine: a check-in the user actually acts on each payday ──
      (function () {
        var host = document.getElementById('paydayReminder');
        if (!host) return;
        if (!st.payday || !(st.payday.net > 0)) { host.style.display = 'none'; return; }

        var money = function (n) { return '$' + Number(n || 0).toLocaleString('en-US'); };
        var periodKey = function (d) { d = d || new Date(); return d.getFullYear() + '-' + (d.getMonth() + 1); };
        var monthName = function (d) { return d.toLocaleDateString('en-US', { month: 'long' }); };
        var checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
        var BUCKETS = [
          { k: 'emergency', label: 'Emergency' },
          { k: 'debt', label: 'Debt' },
          { k: 'invest', label: 'Invest' },
          { k: 'sinking', label: 'Sinking' }
        ];

        function render() {
          var p = S.getState().payday || {};
          var due = p.lastDone !== periodKey();
          var count = p.doneCount || 0;

          if (due) {
            var alloc = p.alloc || {};
            var moveTotal = BUCKETS.reduce(function (t, b) { return t + (alloc[b.k] || 0); }, 0);
            var chips = BUCKETS.filter(function (b) { return (alloc[b.k] || 0) > 0; }).map(function (b) {
              return '<span class="pd-chip"><span class="pl">' + b.label + '</span><b>' + money(alloc[b.k]) + '</b></span>';
            }).join('');
            host.innerHTML =
              '<div class="pd-card due dom-gold">' +
                '<div class="pd-top">' +
                  '<div class="pd-ic">' + S.icon('wallet') + '</div>' +
                  '<div class="pd-eyebrow">Payday routine</div>' +
                  '<span class="pd-dot" aria-hidden="true"></span>' +
                '</div>' +
                '<div class="pd-title">Payday\'s here \u2014 run your plan</div>' +
                '<div class="pd-sub">Move ' + (moveTotal > 0 ? '<b>' + money(moveTotal) + '</b> ' : '') + 'to your buckets <b>before</b> you spend, then check it off.</div>' +
                (chips ? '<div class="pd-chips">' + chips + '</div>' : '') +
                '<div class="pd-actions">' +
                  '<button class="pd-btn pd-primary" id="pdDone">' + checkSvg + 'Mark as done</button>' +
                  '<a class="pd-btn pd-ghost" href="payday.html">View plan</a>' +
                '</div>' +
              '</div>';
            var db = document.getElementById('pdDone');
            if (db) db.addEventListener('click', markDone);
          } else {
            var nxt = new Date(); nxt.setMonth(nxt.getMonth() + 1);
            host.innerHTML =
              '<div class="pd-card dom-gold">' +
                '<div class="pd-done">' +
                  '<div class="pd-check">' + checkSvg + '</div>' +
                  '<div class="pd-done-txt">' +
                    '<div class="pd-done-title">Payday plan done for ' + monthName(new Date()) + '</div>' +
                    '<div class="pd-done-sub">' + count + ' payday' + (count === 1 ? '' : 's') + ' on track \u00b7 next check-in ' + monthName(nxt) + '</div>' +
                  '</div>' +
                  '<button class="pd-undo" id="pdUndo">Undo</button>' +
                '</div>' +
              '</div>';
            var ub = document.getElementById('pdUndo');
            if (ub) ub.addEventListener('click', undo);
          }
        }

        function markDone() {
          var p = S.getState().payday || {};
          p.lastDone = periodKey();
          p.lastDoneAt = Date.now();
          p.doneCount = (p.doneCount || 0) + 1;
          S.patchState({ payday: p });
          render();
        }
        function undo() {
          var p = S.getState().payday || {};
          p.lastDone = '';
          p.doneCount = Math.max(0, (p.doneCount || 0) - 1);
          S.patchState({ payday: p });
          render();
        }

        render();
      })();

      // ── Goal check-in: log this month's contribution against the active goal ──
      (function () {
        var host = document.getElementById('goalCheckin');
        if (!host) return;

        var money = function (n) { return '$' + Number(n || 0).toLocaleString('en-US'); };
        var monthName = function (d) { return d.toLocaleDateString('en-US', { month: 'long' }); };
        var checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
        var plusSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>';

        var idx = (S.getActiveGoalIndex) ? S.getActiveGoalIndex() : -1;
        var g = (S.getActiveGoal) ? S.getActiveGoal() : null;
        // Only meaningful once there's a goal with a monthly plan to track against.
        if (idx < 0 || !g || !g.target || !(g.monthly > 0)) { host.style.display = 'none'; return; }

        var prog = S.goalProgress(g);
        var thisPeriod = S.goalPeriodKey();
        var monthsOnTrack = (function () {
          var seen = {};
          (g.checkins || []).forEach(function (c) { seen[c.period] = 1; });
          return Object.keys(seen).length;
        })();

        if (prog.complete) {
          // Goal reached — nothing left to log, celebrate instead.
          host.innerHTML =
            '<div class="pd-card dom-teal">' +
              '<div class="pd-done">' +
                '<div class="pd-check">' + checkSvg + '</div>' +
                '<div class="pd-done-txt">' +
                  '<div class="pd-done-title">' + esc0(g.name) + ' is fully funded</div>' +
                  '<div class="pd-done-sub">You\u2019ve contributed ' + money(prog.contributed) + ' \u00b7 goal reached</div>' +
                '</div>' +
              '</div>' +
            '</div>';
          return;
        }

        var due = (g.lastCheckIn || '') !== thisPeriod;

        if (due) {
          var plan = g.monthly || 0;
          host.innerHTML =
            '<div class="pd-card due dom-teal">' +
              '<div class="pd-top">' +
                '<div class="pd-ic">' + S.icon('target') + '</div>' +
                '<div class="pd-eyebrow">Goal check-in</div>' +
                '<span class="pd-dot" aria-hidden="true"></span>' +
              '</div>' +
              '<div class="pd-title">Log this month toward ' + esc0(g.name) + '</div>' +
              '<div class="pd-sub">You planned <b>' + money(plan) + '/mo</b>. Put in more or less \u2014 we\u2019ll recalc your finish line.</div>' +
              '<div class="gc-entry">' +
                '<div class="gc-field"><span class="gc-cur">$</span>' +
                  '<input class="gc-input" id="gcInput" type="number" inputmode="decimal" min="0" step="10" value="' + plan + '" aria-label="Contribution amount" />' +
                '</div>' +
                '<button class="gc-log" id="gcLog">' + checkSvg + 'Log</button>' +
              '</div>' +
              '<div class="gc-hint" id="gcHint">' + money(prog.contributed) + ' of ' + money(g.target) + ' so far' +
                (prog.monthsLeft ? ' \u00b7 about ' + Math.round(prog.years) + ' yr' + (Math.round(prog.years) === 1 ? '' : 's') + ' to go at this pace' : '') +
              '</div>' +
            '</div>';

          var input = document.getElementById('gcInput');
          var hint = document.getElementById('gcHint');
          var logBtn = document.getElementById('gcLog');

          // Live preview: recompute the finish line as the user edits the amount.
          function preview() {
            var amt = Number(input.value);
            if (!isFinite(amt) || amt <= 0) { hint.innerHTML = 'Enter what you set aside this month'; return; }
            var sim = S.goalProgress(Object.assign({}, g, { contributed: (g.contributed || 0) + amt }));
            var line = money(sim.contributed) + ' of ' + money(g.target);
            if (sim.complete) line += ' \u00b7 that completes your goal';
            else if (sim.monthsLeft) line += ' \u00b7 about ' + Math.round(sim.years) + ' yr' + (Math.round(sim.years) === 1 ? '' : 's') + ' to go';
            hint.innerHTML = line;
          }
          input.addEventListener('input', preview);
          input.addEventListener('focus', function () { input.select(); });
          input.addEventListener('keydown', function (e) { if (e.key === 'Enter') logBtn.click(); });

          logBtn.addEventListener('click', function () {
            var amt = Number(input.value);
            if (!isFinite(amt) || amt <= 0) { input.focus(); return; }
            S.checkInGoal(idx, amt);
            location.reload(); // refresh the card + carousel progress from fresh state
          });
        } else {
          // Already logged this month — slim confirmation with streak + undo.
          var loggedThis = (g.checkins || []).filter(function (c) { return c.period === thisPeriod; })
            .reduce(function (t, c) { return t + (c.amount || 0); }, 0);
          var nxt = new Date(); nxt.setMonth(nxt.getMonth() + 1);
          host.innerHTML =
            '<div class="pd-card dom-teal">' +
              '<div class="pd-done">' +
                '<div class="pd-check">' + checkSvg + '</div>' +
                '<div class="pd-done-txt">' +
                  '<div class="pd-done-title">Logged ' + money(loggedThis) + ' for ' + monthName(new Date()) + '</div>' +
                  '<div class="pd-done-sub">' + monthsOnTrack + ' month' + (monthsOnTrack === 1 ? '' : 's') + ' on track \u00b7 next check-in ' + monthName(nxt) + '</div>' +
                '</div>' +
                '<button class="pd-undo" id="gcUndo">Undo</button>' +
              '</div>' +
            '</div>';
          var ub = document.getElementById('gcUndo');
          if (ub) ub.addEventListener('click', function () { S.undoLastCheckIn(idx); location.reload(); });
        }

        function esc0(s) {
          return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
          });
        }
      })();

      // ── Goal: the dashboard's primary focus (inline stats, swipeable, + add slide) ──
      (function () {
        var esc = function (s) {
          return String(s).replace(/[&<>"']/g, function (c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
          });
        };
        var money = function (n) { return '$' + Number(n || 0).toLocaleString('en-US'); };
        var pctLabel = function (p) { return (p < 1 ? '<1' : Math.round(p)) + '%'; };
        var pencilSvg =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>';
        var plusSvg =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>';

        var track = document.getElementById('goalTrack');
        var dotsWrap = document.getElementById('goalDots');

        // Unified goal model: goals[] is the source of truth (with legacy fallback).
        var goals = (S.getGoals) ? S.getGoals() : [];
        if (!goals.length) {
          if (Array.isArray(st.goals)) goals = st.goals.filter(function (g) { return g && g.target; });
          else if (st.goal && st.goal.target) goals = [st.goal];
        }

        if (!goals.length) {
          // No goal yet (onboarding skipped) — suggest creating one. Tapping opens the wizard.
          dotsWrap.style.display = 'none';
          var empty = document.createElement('button');
          empty.className = 'goal-hero is-add';
          empty.type = 'button';
          empty.innerHTML =
            '<div class="gh-emoji">' + S.icon('target') + '</div>' +
            '<div class="gh-eyebrow">Get started</div>' +
            '<div class="gh-empty-title">Set your first goal</div>' +
            '<div class="gh-empty-sub">Tell us what you\'re saving for and we\'ll map the path to it.</div>' +
            '<span class="gh-pill gh-pill-cta">' + plusSvg + 'Create a goal</span>';
          empty.addEventListener('click', function () { window.location.href = 'screen7.html'; });
          track.appendChild(empty);
          return;
        }

        // Derive per-goal display data once.
        var data = goals.map(function (g) {
          var monthly = g.monthly || st.monthly || 0;
          // Real progress from what's actually been contributed; finish line recalculated.
          var prog = S.goalProgress(Object.assign({}, g, { monthly: monthly }));
          var contributed = prog.contributed;
          var pct = prog.pct;
          var years = prog.complete ? 0 : (prog.years != null ? prog.years : (g.years || null));
          var completion = '—';
          if (prog.complete) {
            completion = 'Reached';
          } else if (prog.completion) {
            completion = prog.completion.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
          }
          return { g: g, monthly: monthly, years: years, contributed: contributed, pct: pct, completion: completion, complete: prog.complete };
        });

        function statCard(k, v) {
          return '<div class="gh-stat"><div class="k">' + k + '</div><div class="v">' + v + '</div></div>';
        }

        // Build one floating slide per goal — full stats inline, no extra view.
        data.forEach(function (d, i) {
          var ratePct = (d.g.returnRate ? Math.round(d.g.returnRate * 100) : 7);
          var sim = new URLSearchParams();
          if (d.monthly > 0) sim.set('monthly', d.monthly);
          if (d.years && isFinite(d.years)) sim.set('years', Math.max(1, Math.round(d.years)));
          sim.set('return', ratePct);
          sim.set('target', Math.round(d.g.target));
          if (d.g.name) sim.set('name', d.g.name);

          var slide = document.createElement('div');
          slide.className = 'goal-hero';
          slide.setAttribute('data-i', i);
          slide.innerHTML =
            '<div class="gh-tools">' +
              '<a class="gh-iconbtn" href="screen7.html?edit=' + i + '" aria-label="Edit goal">' + pencilSvg + '</a>' +
              '<a class="gh-iconbtn sim" href="screen5.html?' + sim.toString() + '" aria-label="Open in Simulator">' + S.icon('spark') + '</a>' +
            '</div>' +
            '<div class="gh-eyebrow">' + (data.length > 1 ? 'Goal ' + (i + 1) + ' of ' + data.length : 'Your goal') + '</div>' +
            '<div class="gh-name">' + esc(d.g.name) + '</div>' +
            '<div class="gh-amount">' + money(d.g.target) + '</div>' +
            '<div class="gh-progress"><div class="gh-bar"><i style="width:0%"></i></div></div>' +
            '<div class="gh-meta">' + money(d.contributed) + ' of ' + money(d.g.target) + ' · ' + pctLabel(d.pct) + '</div>' +
            '<div class="gh-stats">' +
              statCard('Monthly', d.monthly > 0 ? money(d.monthly) : 'Not set') +
              statCard('Time to goal', d.complete ? 'Reached' : (d.years ? '~' + Math.round(d.years) + ' yrs' : '—')) +
              statCard('Expected return', ratePct + '%') +
              statCard('Est. completion', d.completion) +
            '</div>';
          track.appendChild(slide);
        });

        // Always end with an "Add goal" slide so users can swipe to create another.
        var add = document.createElement('button');
        add.className = 'goal-hero is-add';
        add.type = 'button';
        add.innerHTML =
          '<div class="gh-emoji">' + plusSvg + '</div>' +
          '<div class="gh-empty-title">Add a goal</div>' +
          '<div class="gh-empty-sub">Track another milestone alongside this one.</div>' +
          '<span class="gh-pill gh-pill-cta">' + plusSvg + 'Add a goal</span>';
        add.addEventListener('click', function () { window.location.href = 'screen7.html'; });
        track.appendChild(add);

        requestAnimationFrame(function () {
          track.querySelectorAll('.gh-bar > i').forEach(function (b, i) {
            b.style.width = Math.max(2, data[i].pct) + '%';
          });
        });

        // Paging dots — one per goal plus the trailing add slide.
        var pages = data.length + 1;
        var dots = [];
        for (var p = 0; p < pages; p++) {
          var dot = document.createElement('span');
          dot.className = 'goal-dot' + (p === 0 ? ' active' : '');
          dotsWrap.appendChild(dot);
          dots.push(dot);
        }
        var active = 0;
        track.addEventListener('scroll', function () {
          var i = Math.round(track.scrollLeft / track.clientWidth);
          if (i !== active && dots[i]) {
            dots[active].classList.remove('active');
            dots[i].classList.add('active');
            active = i;
          }
        }, { passive: true });

        // Tapping a dot jumps to that page.
        dots.forEach(function (dot, i) {
          dot.style.cursor = 'pointer';
          dot.addEventListener('click', function () {
            track.scrollTo({ left: i * track.clientWidth, behavior: 'smooth' });
          });
        });

        // Desktop: drag-to-scroll. Native overflow-x only responds to touch/trackpad,
        // so without this a mouse user can't swipe between goals.
        var down = false, startX = 0, startScroll = 0, moved = false;
        track.style.cursor = 'grab';
        track.addEventListener('pointerdown', function (e) {
          if (e.pointerType === 'touch') return; // native touch scrolling already works
          down = true; moved = false;
          startX = e.clientX; startScroll = track.scrollLeft;
          track.style.scrollSnapType = 'none';
          track.style.cursor = 'grabbing';
        });
        window.addEventListener('pointermove', function (e) {
          if (!down) return;
          var dx = e.clientX - startX;
          if (Math.abs(dx) > 4) moved = true;
          track.scrollLeft = startScroll - dx;
        });
        window.addEventListener('pointerup', function () {
          if (!down) return;
          down = false;
          track.style.cursor = 'grab';
          track.style.scrollSnapType = 'x mandatory';
          if (moved) {
            var i = Math.max(0, Math.min(pages - 1, Math.round(track.scrollLeft / track.clientWidth)));
            track.scrollTo({ left: i * track.clientWidth, behavior: 'smooth' });
          }
        });
        // Swallow the click that follows a drag so it doesn't navigate.
        track.addEventListener('click', function (e) {
          if (moved) { e.preventDefault(); e.stopPropagation(); }
        }, true);
      })();

      var allDone = st.lessons.length >= S.LESSONS.length;
      document.getElementById('heroNum').textContent = nextIdx + 1;
      document.getElementById('heroTitle').textContent = allDone ? 'You finished every lesson' : next.title;
      document.getElementById('heroMeta').textContent = allDone ? 'Review anytime · Learning Academy' : (next.mins + ' min · Learning Academy');
      document.querySelector('.hero-eyebrow').textContent = allDone ? 'Keep it sharp' : "Today's lesson";
      document.getElementById('heroBar').style.width = Math.round(st.lessons.length / S.LESSONS.length * 100) + '%';
      var cta = document.getElementById('heroCta');
      cta.textContent = allDone ? 'Review a lesson' : (st.lessons.length === 0 ? 'Start learning' : 'Continue learning');
      cta.addEventListener('click', function () { window.location.href = next.file; });

      var toolStrip = document.getElementById('toolStrip');
      S.TOOLS.slice().sort(function (a, b) { return (b.isNew ? 1 : 0) - (a.isNew ? 1 : 0); }).forEach(function (t) {
        var a = document.createElement('a');
        a.className = 'tool-card dom-' + (t.dom || 'teal');
        a.href = t.file;
        a.innerHTML =
          (t.isNew ? '<span class="wv-badge-new">New</span>' : '') +
          '<div class="ic">' + S.icon(t.icon) + '</div>' +
          '<div class="t">' + t.title + '</div><div class="d">' + t.desc + '</div>';
        toolStrip.appendChild(a);
      });
    })();
  </script>
</body>
</html>
