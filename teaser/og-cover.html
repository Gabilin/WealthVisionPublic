<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200, initial-scale=1" />
  <title>WealthVision OG cover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; }
    :root {
      --bg: #0c0c0e; --hi: #ececed; --mid: #9a9aa1; --lo: #5e5e66;
      --teal: #22ab94; --teal-br: #3ad9bf; --hair: rgba(255,255,255,0.10); --hair2: rgba(255,255,255,0.16);
    }

    .og {
      position: relative;
      width: 1200px; height: 630px;
      overflow: hidden;
      background: var(--bg);
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex; align-items: center;
    }
    /* ambient glows */
    .og::before {
      content: ""; position: absolute; z-index: 0;
      width: 760px; height: 760px; right: -120px; top: 50%; transform: translateY(-50%);
      background: radial-gradient(circle, rgba(34,171,148,0.28), rgba(34,171,148,0.06) 42%, transparent 62%);
      filter: blur(8px);
    }
    .og::after {
      content: ""; position: absolute; z-index: 0;
      width: 520px; height: 520px; left: -160px; bottom: -220px;
      background: radial-gradient(circle, rgba(34,171,148,0.12), transparent 60%);
      filter: blur(10px);
    }

    /* ── Left: brand ── */
    .left { position: relative; z-index: 2; width: 640px; flex-shrink: 0; padding: 0 0 0 76px; }
    .mark { width: 108px; height: 62px; margin-bottom: 26px; overflow: visible; }
    .mark path { filter: drop-shadow(0 4px 16px rgba(34,171,148,0.5)); }
    .mark circle { filter: drop-shadow(0 0 10px rgba(34,171,148,0.85)); }

    .wordmark { font-size: 84px; font-weight: 700; letter-spacing: -0.035em; line-height: 1; }
    .wordmark .w { color: var(--hi); }
    .wordmark .v { color: var(--teal); }

    .tagline {
      margin-top: 22px; font-size: 27px; font-weight: 400; line-height: 1.32;
      color: var(--mid); max-width: 540px; letter-spacing: -0.01em;
    }

    .chips { margin-top: 36px; display: flex; gap: 13px; }
    .chip {
      display: inline-flex; align-items: center; gap: 9px; white-space: nowrap;
      padding: 12px 18px; border: 1px solid var(--hair2); border-radius: 999px;
      background: rgba(255,255,255,0.03); color: var(--hi); font-size: 18px; font-weight: 500;
    }
    .chip svg { width: 18px; height: 18px; stroke: var(--teal); fill: none; stroke-width: 1.8; }

    /* ── Right: phone ── */
    .right { position: relative; z-index: 2; flex: 1; display: flex; justify-content: center; }
    .phone {
      position: relative;
      width: 312px; height: 620px;
      border-radius: 46px; padding: 10px;
      background: linear-gradient(160deg, #26262b, #0d0d10 60%);
      border: 1px solid var(--hair2);
      box-shadow: 0 40px 90px rgba(0,0,0,0.6), 0 14px 34px rgba(0,0,0,0.5),
                  0 0 60px rgba(34,171,148,0.12);
      transform: rotate(-5deg);
    }
    .screen {
      width: 100%; height: 100%; border-radius: 38px; overflow: hidden;
      background: var(--bg); position: relative;
      display: flex; flex-direction: column;
    }
    .statusbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px 6px; color: var(--hi); font-size: 13px; font-weight: 600;
    }
    .statusbar .dots { display: flex; align-items: center; gap: 5px; }
    .statusbar .dots svg { width: 16px; height: 12px; fill: var(--hi); }

    .head {
      display: flex; align-items: center; gap: 10px; padding: 6px 22px 14px; color: var(--hi);
    }
    .head .burger { display: flex; flex-direction: column; gap: 3px; }
    .head .burger i { width: 16px; height: 2px; background: var(--mid); border-radius: 2px; }
    .head .title { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }

    .body { flex: 1; padding: 4px 22px 0; }
    .eyebrow { font-size: 10.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--teal); }
    .big { margin-top: 6px; font-family: "IBM Plex Mono", monospace; font-size: 34px; font-weight: 600; letter-spacing: -0.02em; color: var(--hi); }
    .sub { margin-top: 3px; font-size: 12.5px; color: var(--mid); }

    .chart { margin-top: 14px; width: 100%; height: 208px; display: block; }
    .note { margin-top: 8px; font-size: 10.5px; color: var(--lo); }

    .tabbar {
      margin-top: auto; display: flex; justify-content: space-between;
      padding: 12px 22px 20px; border-top: 1px solid var(--hair);
    }
    .tab { display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--lo); font-size: 10px; font-weight: 600; }
    .tab.on { color: var(--teal); }
    .tab svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  </style>
</head>
<body>
  <div class="og">
    <div class="left">
      <svg class="mark" viewBox="0 0 108 62" aria-hidden="true">
        <path d="M6 54 L40 30 L58 42 L102 8" fill="none" stroke="#22ab94" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="102" cy="8" r="6" fill="#22ab94" />
      </svg>
      <div class="wordmark"><span class="w">Wealth</span><span class="v">Vision</span></div>
      <div class="tagline">The finance app that never asks for your bank login.</div>
      <div class="chips">
        <span class="chip">
          <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11 V8 a4 4 0 0 1 8 0 v3"/></svg>
          100% offline
        </span>
        <span class="chip">
          <svg viewBox="0 0 24 24"><path d="M12 3 l7 3 v5 c0 4.5 -3 7.5 -7 9 c-4 -1.5 -7 -4.5 -7 -9 V6 z"/></svg>
          No accounts
        </span>
        <span class="chip">
          <svg viewBox="0 0 24 24"><path d="M7 8 c-3 0 -4 8 0 8 c3 0 5 -8 10 -8 c3 0 3 8 0 8 c-5 0 -7 -8 -10 -8 z"/></svg>
          One-time unlock
        </span>
      </div>
    </div>

    <div class="right">
      <div class="phone">
        <div class="screen">
          <div class="statusbar">
            <span>9:41</span>
            <span class="dots">
              <svg viewBox="0 0 18 12"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4" y="5" width="3" height="7" rx="1"/><rect x="8" y="2.5" width="3" height="9.5" rx="1"/><rect x="12" y="0" width="3" height="12" rx="1"/></svg>
              <svg viewBox="0 0 18 12"><path d="M9 3.5 C5.5 3.5 3 5 1.5 6.8 M9 3.5 C12.5 3.5 15 5 16.5 6.8 M9 7 C7.7 7 6.6 7.6 5.8 8.5 M9 7 C10.3 7 11.4 7.6 12.2 8.5" fill="none" stroke="#ececed" stroke-width="1.4" stroke-linecap="round"/><circle cx="9" cy="10.5" r="1.1"/></svg>
              <svg viewBox="0 0 18 12"><rect x="0.5" y="1.5" width="14" height="9" rx="2" fill="none" stroke="#ececed" stroke-width="1.2"/><rect x="2" y="3" width="10.5" height="6" rx="1"/><rect x="15.2" y="4" width="1.6" height="4" rx="0.8"/></svg>
            </span>
          </div>
          <div class="head">
            <span class="burger"><i></i><i></i><i></i></span>
            <span class="title">Growth Simulator</span>
          </div>
          <div class="body">
            <div class="eyebrow">Projected in 30 years</div>
            <div class="big">$243,994</div>
            <div class="sub">$200/mo · 7% historical average</div>

            <svg class="chart" viewBox="0 0 280 208" preserveAspectRatio="none" aria-hidden="true">
              <defs>
                <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0" stop-color="#22ab94" stop-opacity="0.42"/>
                  <stop offset="1" stop-color="#22ab94" stop-opacity="0"/>
                </linearGradient>
              </defs>
              <!-- gridlines -->
              <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
                <line x1="0" y1="26" x2="280" y2="26"/>
                <line x1="0" y1="70" x2="280" y2="70"/>
                <line x1="0" y1="114" x2="280" y2="114"/>
                <line x1="0" y1="158" x2="280" y2="158"/>
                <line x1="0" y1="188" x2="280" y2="188"/>
              </g>
              <!-- area -->
              <path d="M6 184 C70 176 120 158 160 122 S238 44 274 16 L274 188 L6 188 Z" fill="url(#fill)"/>
              <!-- line -->
              <path d="M6 184 C70 176 120 158 160 122 S238 44 274 16" fill="none" stroke="#22ab94" stroke-width="3" stroke-linecap="round"/>
              <circle cx="274" cy="16" r="5" fill="#3ad9bf"/>
            </svg>
            <div class="note">Illustrative — historical average, not a guarantee.</div>
          </div>
          <div class="tabbar">
            <span class="tab on">
              <svg viewBox="0 0 24 24"><path d="M4 11 L12 4 L20 11 M6 10 V20 h12 V10"/></svg>
              Home
            </span>
            <span class="tab">
              <svg viewBox="0 0 24 24"><path d="M5 5 h9 a3 3 0 0 1 3 3 v11 a2 2 0 0 0 -2 -2 H5 z"/><path d="M17 8 h2 v11"/></svg>
              Learn
            </span>
            <span class="tab">
              <svg viewBox="0 0 24 24"><path d="M14 6 a4 4 0 0 0 5 5 l-8 8 a2.5 2.5 0 0 1 -4 -4 z"/></svg>
              Tools
            </span>
            <span class="tab">
              <svg viewBox="0 0 24 24"><path d="M7 4 h10 v4 a5 5 0 0 1 -10 0 z M12 13 v4 M9 20 h6"/></svg>
              Rewards
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
