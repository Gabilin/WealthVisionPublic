<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WealthVision — Learn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="proto-shell.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080a0e;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    .device-frame {
      width: 393px; height: 852px; border-radius: 47px; overflow: hidden;
      position: relative; background: #10141a;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.3), 0 25px 60px rgba(0,0,0,0.5), 0 50px 120px rgba(0,0,0,0.25);
    }

    .progress-card {
      border-radius: 18px; padding: 16px 18px; overflow: hidden;
      background:
        radial-gradient(120% 130% at 100% 0%, rgba(155,135,255,0.16), transparent 55%),
        linear-gradient(160deg, var(--glass-top), var(--glass-bot));
      -webkit-backdrop-filter: blur(16px) saturate(1.15); backdrop-filter: blur(16px) saturate(1.15);
      border: 1px solid rgba(155,135,255,0.24);
      box-shadow: inset 0 1px 0 var(--hi-glow), var(--shadow);
      display: flex; align-items: center; gap: 16px;
    }
    .ring { position: relative; width: 58px; height: 58px; flex: 0 0 auto; }
    .ring svg { transform: rotate(-90deg); }
    .ring .label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: var(--text-hi); }
    .progress-card .meta .big { font-size: 15px; font-weight: 700; color: var(--text-hi); }
    .progress-card .meta .sub { font-size: 12px; color: var(--text-mid); margin-top: 3px; }

    .lesson {
      display: flex; align-items: center; gap: 13px; text-decoration: none;
      padding: 13px 14px; border-radius: 15px; margin-bottom: 9px;
      background: linear-gradient(160deg, var(--glass-top), var(--glass-bot));
      -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
      border: 1px solid var(--hairline);
      box-shadow: inset 0 1px 0 var(--hi-glow);
      transition: transform 140ms ease;
    }
    .lesson:active { transform: scale(0.985); }
    .lesson.done { border-color: rgba(155,135,255,0.24); background: rgba(155,135,255,0.08); }
    .lesson.next { border-color: rgba(155,135,255,0.42); background: rgba(155,135,255,0.13); }
    .l-ic {
      width: 38px; height: 38px; flex: 0 0 auto; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: var(--text-mid);
      background: var(--surface);
    }
    .lesson.done .l-ic { background: rgba(155,135,255,0.18); color: #b3a4ff; }
    .lesson.next .l-ic { background: #9b87ff; color: #1a1238; }
    .l-body { flex: 1; min-width: 0; }
    .l-title { font-size: 14px; font-weight: 700; color: var(--text-hi); letter-spacing: -0.01em; }
    .l-meta { font-size: 11.5px; color: var(--text-mid); margin-top: 2px; }
    .l-status { font-size: 11px; font-weight: 700; color: var(--text-mid); }
    .lesson.done .l-status { color: #b3a4ff; }
    .lesson.next .l-status { color: #b3a4ff; }
    .check { width: 18px; height: 18px; }
  </style>
</head>
<body data-wv-tab="learn">
  <div class="device-frame">
    <div class="wv-hub">
      <div class="wv-top">
        <div>
          <div class="wv-hello">Learning Academy</div>
          <div class="wv-page-title">Learn</div>
        </div>
        <div class="wv-flame" id="streakPill">🔥 <span id="streakNum">0</span></div>
      </div>

      <div class="wv-scroll">
        <section class="progress-card">
          <div class="ring">
            <svg width="58" height="58">
              <circle cx="29" cy="29" r="24" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="6"></circle>
              <circle id="ringFg" cx="29" cy="29" r="24" fill="none" stroke="#9b87ff" stroke-width="6"
                      stroke-linecap="round" stroke-dasharray="150.8" stroke-dashoffset="150.8"></circle>
            </svg>
            <div class="label" id="ringLabel">0%</div>
          </div>
          <div class="meta">
            <div class="big" id="progBig">Start your journey</div>
            <div class="sub" id="progSub">0 of 7 lessons complete</div>
          </div>
        </section>

        <div class="wv-section-head">
          <div class="wv-section-title">Foundations</div>
        </div>
        <div id="foundationsList"></div>

        <div class="wv-section-head">
          <div class="wv-section-title">Academy lessons</div>
        </div>
        <div id="lessonsList"></div>
      </div>
    </div>
  </div>

  <script src="proto-shell.js"></script>
  <script>
    (function () {
      var S = window.WVShell;
      var st = S.getState();
      document.getElementById('streakNum').textContent = st.streak.count;

      var done = st.lessons.length, total = S.LESSONS.length;
      var pct = Math.round(done / total * 100);
      document.getElementById('ringLabel').textContent = pct + '%';
      var circ = 2 * Math.PI * 24;
      document.getElementById('ringFg').setAttribute('stroke-dasharray', circ.toFixed(1));
      document.getElementById('ringFg').setAttribute('stroke-dashoffset', (circ * (1 - done / total)).toFixed(1));
      document.getElementById('progBig').textContent = done === 0 ? 'Start your journey' : (done >= total ? 'Academy complete!' : 'Keep going');
      document.getElementById('progSub').textContent = done + ' of ' + total + ' lessons complete';

      function checkSvg() {
        return '<svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5L20 6"/></svg>';
      }

      var fEl = document.getElementById('foundationsList');
      S.FOUNDATIONS.forEach(function (l) {
        var isDone = st.visited.indexOf(l.file) !== -1;
        var a = document.createElement('a');
        a.className = 'lesson' + (isDone ? ' done' : '');
        a.href = l.file;
        a.innerHTML =
          '<div class="l-ic">' + (isDone ? checkSvg() : '•') + '</div>' +
          '<div class="l-body"><div class="l-title">' + l.title + '</div><div class="l-meta">' + l.mins + ' min</div></div>' +
          '<div class="l-status">' + (isDone ? 'Done' : 'Open') + '</div>';
        fEl.appendChild(a);
      });

      var next = S.nextLesson(st);
      var lEl = document.getElementById('lessonsList');
      S.LESSONS.forEach(function (l, i) {
        var isDone = st.lessons.indexOf(l.file) !== -1;
        var isNext = next && next.file === l.file;
        var a = document.createElement('a');
        a.className = 'lesson' + (isDone ? ' done' : (isNext ? ' next' : ''));
        a.href = l.file;
        a.innerHTML =
          '<div class="l-ic">' + (isDone ? checkSvg() : (i + 1)) + '</div>' +
          '<div class="l-body"><div class="l-title">' + l.title + '</div><div class="l-meta">' + l.mins + ' min · +20 XP</div></div>' +
          '<div class="l-status">' + (isDone ? 'Done' : (isNext ? 'Continue' : 'Open')) + '</div>';
        lEl.appendChild(a);
      });
    })();
  </script>
</body>
</html>
