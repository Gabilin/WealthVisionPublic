<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Longview — Set up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0c0c0e; --card:#1b1b1f; --card-h:#222228; --stroke:rgba(255,255,255,0.07); --stroke-2:rgba(255,255,255,0.14);
    --text:#ececed; --dim:#8e8e95; --dim2:#5e5e66; --green:#22ab94; --red:#f7525f; --blue:#2962ff;
  }
  body{min-height:100vh; display:flex; align-items:center; justify-content:center; background:#050506; padding:24px;
    font-family:'IBM Plex Sans',sans-serif; color:var(--text)}
  .mono{font-family:'IBM Plex Mono',monospace; font-variant-numeric:tabular-nums}
  .frame{width:393px; height:852px; border-radius:20px; position:relative; overflow:hidden; background:var(--bg); box-shadow:0 40px 90px rgba(0,0,0,0.6), inset 0 0 0 1px var(--stroke)}
  .scroll{position:absolute; inset:0; overflow-y:auto; padding:56px 18px 0; z-index:2; display:flex; flex-direction:column; min-height:100%}
  .scroll::-webkit-scrollbar{width:0}

  .topbar{position:absolute; top:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:16px 20px; z-index:6}
  .topbar .step{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--dim)}
  .topbar .skip{font-size:14px; color:var(--dim); text-decoration:none}

  h1{font-size:30px; font-weight:700; letter-spacing:-0.025em; line-height:1.05}
  .sub{font-size:15px; color:var(--dim); line-height:1.45; margin-top:9px; max-width:320px}

  .chips{display:flex; gap:8px; overflow-x:auto; margin:20px -18px 6px; padding:0 18px 2px}
  .chips::-webkit-scrollbar{height:0}
  .chip{flex:0 0 auto; font-size:13.5px; font-weight:500; color:var(--dim); background:var(--card); border:1px solid var(--stroke); border-radius:999px; padding:8px 15px; cursor:pointer; white-space:nowrap}
  .chip.on{color:#0c0c0e; background:#ececed; border-color:#ececed; font-weight:600}

  .label{font-size:12.5px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:var(--dim); margin:18px 2px 11px}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .mcard{position:relative; overflow:hidden; cursor:pointer; text-align:left; background:var(--card); border:1px solid var(--stroke); border-radius:15px; padding:14px 14px 0; height:138px; transition:transform .16s cubic-bezier(.2,.8,.2,1), border-color .16s; font:inherit; color:var(--text)}
  .mcard:active{transform:scale(0.98)}
  .mcard.on{border-color:var(--blue); box-shadow:0 0 0 1px var(--blue)}
  .mc-top{display:flex; align-items:center; justify-content:space-between}
  .badge{width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:10px; color:#0c0c0e}
  .mc-tag{font-size:10.5px; color:var(--dim); border:1px solid var(--stroke-2); border-radius:5px; padding:2px 6px}
  .mc-name{position:relative; z-index:1; font-size:14.5px; font-weight:600; margin-top:11px; letter-spacing:-0.01em}
  .mc-target{position:relative; z-index:1; font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--dim); margin-top:2px}
  .mc-target b{color:var(--text); font-weight:600}
  .mc-spark{position:absolute; left:0; right:0; bottom:0; width:100%; height:36px; display:block; z-index:0}
  .mcard.on .check{position:absolute; top:13px; right:13px; opacity:1}

  .promo{position:relative; border-radius:16px; padding:1.5px; margin-top:16px; background:linear-gradient(120deg,#f7525f,#9c4dff 50%,#2962ff)}
  .promo .inner{background:#141418; border-radius:14.5px; padding:15px 16px; display:flex; align-items:center; gap:13px}
  .promo .p-ic{width:38px; height:38px; border-radius:10px; flex:0 0 auto; background:rgba(41,98,255,0.15); display:flex; align-items:center; justify-content:center}
  .promo .p-ic svg{width:21px; height:21px; stroke:#7aa2ff; stroke-width:1.8; fill:none}
  .promo .p-t{font-size:14.5px; font-weight:600} .promo .p-d{font-size:12.5px; color:var(--dim); margin-top:2px; line-height:1.35}
  .promo .toggle{margin-left:auto; width:44px; height:27px; border-radius:99px; background:var(--green); position:relative; flex:0 0 auto}
  .promo .toggle::after{content:''; position:absolute; top:2.5px; right:2.5px; width:22px; height:22px; border-radius:50%; background:#fff}

  .spacer{flex:1; min-height:14px}
  .footer{position:sticky; bottom:0; padding:14px 0 calc(20px + env(safe-area-inset-bottom)); background:linear-gradient(to top, var(--bg) 60%, transparent)}
  .cta{display:block; width:100%; text-align:center; text-decoration:none; cursor:pointer; border:none; font-family:'IBM Plex Sans',sans-serif; font-weight:600; font-size:15.5px; color:#06120f; padding:15px; border-radius:12px; background:var(--green); transition:transform .12s, filter .15s}
  .cta:hover{filter:brightness(1.08)} .cta:active{transform:scale(0.98)}
  .disc{font-size:11px; color:var(--dim2); text-align:center; margin-top:11px; line-height:1.5}
</style>
</head>
<body>
<div class="frame">
  <div class="topbar"><span class="step">SETUP</span><a class="skip" href="dashboard.html">Skip</a></div>
  <div class="scroll">
    <h1>What are you<br>building toward?</h1>
    <p class="sub">Pick a goal to track. Longview follows it like a chart, so you can watch it trend up.</p>

    <div class="chips">
      <button class="chip on">All</button>
      <button class="chip">Independence</button>
      <button class="chip">Property</button>
      <button class="chip">Safety</button>
      <button class="chip">Family</button>
      <button class="chip">Lifestyle</button>
    </div>

    <div class="label">Popular goals</div>
    <div class="grid">
      <button class="mcard on" onclick="pick(this)">
        <span class="check"></span>
        <div class="mc-top"><span class="badge" style="background:#2962ff">FRE</span><span class="mc-tag">core</span></div>
        <div class="mc-name">Financial Freedom</div>
        <div class="mc-target">target <b>$500k</b></div>
        <svg class="mc-spark" viewBox="0 0 170 46" preserveAspectRatio="none"><defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#22ab94" stop-opacity="0.35"/><stop offset="1" stop-color="#22ab94" stop-opacity="0"/></linearGradient></defs><path d="M0 40 C30 38 50 30 80 24 C110 18 140 12 170 6 L170 46 L0 46Z" fill="url(#g1)"/><path d="M0 40 C30 38 50 30 80 24 C110 18 140 12 170 6" fill="none" stroke="#22ab94" stroke-width="1.6"/></svg>
      </button>
      <button class="mcard" onclick="pick(this)">
        <div class="mc-top"><span class="badge" style="background:#22ab94">HOM</span><span class="mc-tag">5 yr</span></div>
        <div class="mc-name">House Deposit</div>
        <div class="mc-target">target <b>$60k</b></div>
        <svg class="mc-spark" viewBox="0 0 170 46" preserveAspectRatio="none"><defs><linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#22ab94" stop-opacity="0.35"/><stop offset="1" stop-color="#22ab94" stop-opacity="0"/></linearGradient></defs><path d="M0 38 C30 36 48 38 78 28 C108 20 138 16 170 9 L170 46 L0 46Z" fill="url(#g2)"/><path d="M0 38 C30 36 48 38 78 28 C108 20 138 16 170 9" fill="none" stroke="#22ab94" stroke-width="1.6"/></svg>
      </button>
      <button class="mcard" onclick="pick(this)">
        <div class="mc-top"><span class="badge" style="background:#f7a600">SAF</span><span class="mc-tag">liquid</span></div>
        <div class="mc-name">Safety Net</div>
        <div class="mc-target">target <b>$15k</b></div>
        <svg class="mc-spark" viewBox="0 0 170 46" preserveAspectRatio="none"><defs><linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#22ab94" stop-opacity="0.3"/><stop offset="1" stop-color="#22ab94" stop-opacity="0"/></linearGradient></defs><path d="M0 30 C30 28 50 32 80 26 C110 22 140 24 170 18 L170 46 L0 46Z" fill="url(#g3)"/><path d="M0 30 C30 28 50 32 80 26 C110 22 140 24 170 18" fill="none" stroke="#22ab94" stroke-width="1.6"/></svg>
      </button>
      <button class="mcard" onclick="pick(this)">
        <div class="mc-top"><span class="badge" style="background:#9c4dff">EDU</span><span class="mc-tag">long</span></div>
        <div class="mc-name">Education Fund</div>
        <div class="mc-target">target <b>$120k</b></div>
        <svg class="mc-spark" viewBox="0 0 170 46" preserveAspectRatio="none"><defs><linearGradient id="g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#22ab94" stop-opacity="0.35"/><stop offset="1" stop-color="#22ab94" stop-opacity="0"/></linearGradient></defs><path d="M0 42 C30 40 50 34 80 27 C110 20 140 14 170 8 L170 46 L0 46Z" fill="url(#g4)"/><path d="M0 42 C30 40 50 34 80 27 C110 20 140 14 170 8" fill="none" stroke="#22ab94" stroke-width="1.6"/></svg>
      </button>
    </div>

    <div class="promo"><div class="inner">
      <span class="p-ic"><svg viewBox="0 0 24 24"><path d="M12 3v18M5 10l7-7 7 7"/><path d="M5 21h14"/></svg></span>
      <div><div class="p-t">Automate it</div><div class="p-d">Set a monthly auto-deposit. Saving happens on its own.</div></div>
      <span class="toggle"></span>
    </div></div>

    <div class="spacer"></div>
    <div class="footer">
      <a class="cta" href="dashboard.html">Continue</a>
      <p class="disc">Educational tool, not investment advice. Your capital stays your own.</p>
    </div>
  </div>
</div>
<script>function pick(el){document.querySelectorAll('.mcard').forEach(m=>m.classList.remove('on'));el.classList.add('on');}</script>
</body>
</html>
