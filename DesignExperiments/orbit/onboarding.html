<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBIT — Chart your course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --space-0:#06091a; --space-1:#0c1130; --panel:rgba(143,168,255,0.06); --line:rgba(143,168,255,0.18);
    --ink:#eaf0ff; --ink-soft:#97a3d6; --ink-dim:#5d68a0;
    --star:#ffc46b; --star-hot:#ffe6b3; --orbit:#8fa8ff; --cyan:#a9d6ff; --nebula:#c98fe0; --aurora:#7fe0c0;
  }
  body{min-height:100vh; display:flex; align-items:center; justify-content:center; background:#02030a; padding:24px;
    font-family:'Sora',sans-serif; color:var(--ink)}
  .frame{width:393px; height:852px; border-radius:40px; position:relative; overflow:hidden;
    background:
      radial-gradient(120% 80% at 80% -5%, rgba(201,143,224,0.18), transparent 45%),
      radial-gradient(120% 70% at 10% 30%, rgba(143,168,255,0.14), transparent 50%),
      radial-gradient(140% 100% at 50% 110%, rgba(127,224,192,0.10), transparent 55%),
      linear-gradient(180deg, var(--space-1), var(--space-0));
    box-shadow:0 40px 100px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(143,168,255,0.14);}
  /* starfield */
  .stars{position:absolute; inset:0; pointer-events:none;
    background-image:
      radial-gradient(1px 1px at 20% 14%, #fff, transparent),
      radial-gradient(1px 1px at 68% 8%, #cdd8ff, transparent),
      radial-gradient(1.5px 1.5px at 82% 26%, #fff, transparent),
      radial-gradient(1px 1px at 38% 32%, #b9c6ff, transparent),
      radial-gradient(1px 1px at 12% 52%, #fff, transparent),
      radial-gradient(1px 1px at 90% 60%, #e7ddff, transparent),
      radial-gradient(1px 1px at 55% 72%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 30% 84%, #cdd8ff, transparent),
      radial-gradient(1px 1px at 74% 90%, #fff, transparent);
    opacity:0.85}
  .tw{position:absolute; width:2px; height:2px; border-radius:50%; background:#fff; animation:tw 3.5s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:0.15; transform:scale(0.8)}50%{opacity:1; transform:scale(1.3)}}
  .scroll{position:absolute; inset:0; overflow-y:auto; padding:30px 26px 28px; z-index:3}
  .scroll::-webkit-scrollbar{width:0}

  .wm{display:flex; align-items:center; gap:9px; justify-content:center; font-family:'Syne',sans-serif; font-weight:800;
    letter-spacing:0.42em; font-size:13px; text-indent:0.42em; color:var(--ink)}
  .wm .o{width:13px; height:13px; border:2px solid var(--star); border-radius:50%; position:relative}
  .wm .o::after{content:''; position:absolute; width:4px; height:4px; background:var(--star); border-radius:50%; top:-3px; left:50%; transform:translateX(-50%); box-shadow:0 0 6px var(--star)}
  .est{text-align:center; font-size:10.5px; letter-spacing:0.3em; color:var(--ink-dim); margin-top:6px; text-transform:uppercase}

  /* forming star */
  .sky{position:relative; height:210px; margin:8px 0 4px; display:flex; align-items:center; justify-content:center}
  .ring{position:absolute; border:1px solid var(--line); border-radius:50%; left:50%; top:50%; transform:translate(-50%,-50%)}
  .ring.a{width:180px; height:180px; animation:spin 18s linear infinite}
  .ring.b{width:118px; height:118px; animation:spin 11s linear infinite reverse}
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
  .ring .pl{position:absolute; top:-4px; left:50%; transform:translateX(-50%); width:9px; height:9px; border-radius:50%}
  .ring.a .pl{background:var(--cyan); box-shadow:0 0 10px var(--cyan)}
  .ring.b .pl{background:var(--nebula); box-shadow:0 0 10px var(--nebula)}
  .core{width:96px; height:96px; border-radius:50%;
    background:radial-gradient(circle at 42% 36%, #fff 0%, var(--star-hot) 26%, var(--star) 58%, #d97e2a 100%);
    box-shadow:0 0 50px 8px rgba(255,196,107,0.5), 0 0 110px 26px rgba(255,140,80,0.22); animation:pulse 4.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

  h1{font-family:'Syne',sans-serif; font-weight:800; font-size:38px; line-height:1.0; letter-spacing:-0.02em; text-align:center; margin-top:6px}
  .lede{text-align:center; font-weight:300; font-size:15.5px; line-height:1.55; color:var(--ink-soft); margin:13px auto 22px; max-width:300px}

  .pick-h{font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--ink-dim); margin:0 2px 12px; display:flex; align-items:center; gap:10px}
  .pick-h::after{content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--line),transparent)}

  .dest{display:flex; align-items:center; gap:14px; width:100%; cursor:pointer; text-align:left;
    background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:13px 15px; margin-bottom:11px;
    transition:transform .18s cubic-bezier(.2,.8,.2,1), border-color .18s, background .18s; position:relative; overflow:hidden}
  .dest:hover{transform:translateY(-2px); border-color:rgba(143,168,255,0.4)}
  .dest.on{border-color:var(--star); background:linear-gradient(120deg, rgba(255,196,107,0.12), rgba(143,168,255,0.06))}
  .dest .glyph{width:46px; height:46px; flex:0 0 auto; position:relative}
  .dest .nm{display:block; font-family:'Syne',sans-serif; font-weight:700; font-size:16.5px; color:var(--ink); line-height:1.15}
  .dest .ds{display:block; font-weight:300; font-size:13px; color:var(--ink-soft); margin-top:3px}
  .dest .dot{margin-left:auto; width:18px; height:18px; border-radius:50%; border:1px solid var(--ink-dim); flex:0 0 auto; position:relative}
  .dest.on .dot{border-color:var(--star); background:radial-gradient(circle,var(--star-hot),var(--star)); box-shadow:0 0 10px var(--star)}

  .cta{display:flex; align-items:center; justify-content:center; gap:10px; width:100%; margin:20px 0 8px; cursor:pointer; text-decoration:none; border:none;
    font-family:'Syne',sans-serif; font-weight:700; font-size:18px; color:#1a1230; padding:16px; border-radius:16px;
    background:linear-gradient(120deg, var(--star-hot), var(--star)); box-shadow:0 0 30px rgba(255,196,107,0.45); transition:transform .14s, box-shadow .14s}
  .cta:active{transform:scale(0.98)}
  .note{text-align:center; font-weight:300; font-size:12px; color:var(--ink-dim); margin-top:10px}
</style>
</head>
<body>
<div class="frame">
  <div class="stars"></div>
  <span class="tw" style="top:90px;left:48px"></span>
  <span class="tw" style="top:130px;right:60px;animation-delay:1s"></span>
  <span class="tw" style="top:300px;left:40px;animation-delay:1.8s"></span>
  <span class="tw" style="bottom:160px;right:44px;animation-delay:.6s"></span>
  <div class="scroll">
    <div class="wm"><span class="o"></span>ORBIT</div>
    <div class="est">stellar cartography for your money</div>

    <div class="sky">
      <div class="ring a"><span class="pl"></span></div>
      <div class="ring b"><span class="pl"></span></div>
      <div class="core"></div>
    </div>

    <h1>Chart your<br>course</h1>
    <p class="lede">Every fortune begins as a single spark. Choose a destination, and we'll plot the trajectory that gets you there.</p>

    <div class="pick-h">Set a destination</div>

    <button class="dest on" onclick="pick(this)">
      <span class="glyph"><svg viewBox="0 0 46 46" fill="none"><circle cx="23" cy="23" r="9" fill="#ffc46b"/><circle cx="23" cy="23" r="9" stroke="#ffe6b3" stroke-width="1" opacity="0.6"/><ellipse cx="23" cy="23" rx="20" ry="7" stroke="#8fa8ff" stroke-width="1.3" transform="rotate(-20 23 23)"/><circle cx="40" cy="16" r="2" fill="#a9d6ff"/></svg></span>
      <span><span class="nm">Escape Velocity</span><span class="ds">Financial freedom &#183; break free of the daily grind's gravity</span></span>
      <span class="dot"></span>
    </button>

    <button class="dest" onclick="pick(this)">
      <span class="glyph"><svg viewBox="0 0 46 46" fill="none"><circle cx="23" cy="24" r="11" fill="#8fb8ff"/><path d="M14 24a9 9 0 0118 0" fill="#6e9bff"/><circle cx="23" cy="24" r="11" stroke="#bcd4ff" stroke-width="1" opacity="0.5"/><path d="M12 18c4-2 18-2 22 0" stroke="#d7e6ff" stroke-width="1" opacity="0.5"/></svg></span>
      <span><span class="nm">Homeworld</span><span class="ds">A house deposit &#183; a planet to call your own</span></span>
      <span class="dot"></span>
    </button>

    <button class="dest" onclick="pick(this)">
      <span class="glyph"><svg viewBox="0 0 46 46" fill="none"><path d="M23 8l2.6 6.4L32 17l-6.4 2.6L23 26l-2.6-6.4L14 17l6.4-2.6L23 8z" fill="#a9d6ff"/><circle cx="34" cy="30" r="2" fill="#fff"/><circle cx="13" cy="32" r="1.5" fill="#c98fe0"/><circle cx="30" cy="12" r="1.5" fill="#fff"/></svg></span>
      <span><span class="nm">The Lighthouse</span><span class="ds">Emergency fund &#183; a fixed point when storms hit</span></span>
      <span class="dot"></span>
    </button>

    <button class="dest" onclick="pick(this)">
      <span class="glyph"><svg viewBox="0 0 46 46" fill="none"><circle cx="16" cy="28" r="6" fill="#c98fe0"/><circle cx="30" cy="18" r="8" fill="#7fe0c0"/><path d="M16 28L30 18" stroke="#9aa6d6" stroke-width="1" stroke-dasharray="2 3"/><circle cx="38" cy="34" r="1.6" fill="#fff"/></svg></span>
      <span><span class="nm">The Long Voyage</span><span class="ds">Retirement &#183; a distant world, reached by patience</span></span>
      <span class="dot"></span>
    </button>

    <a class="cta" href="dashboard.html">Ignite &#10148;</a>
    <p class="note">Trajectories are illustrative. The cosmos makes no guarantees.</p>
  </div>
</div>
<script>function pick(el){document.querySelectorAll('.dest').forEach(d=>d.classList.remove('on'));el.classList.add('on');}</script>
</body>
</html>
