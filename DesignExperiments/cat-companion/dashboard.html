<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nibbles — Your stash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--cream:#fff7ec;--peach:#ffe3cf;--milk:#fffdf8;--ink:#5b4636;--ink-soft:#9b8978;
    --ginger:#f5a04e;--ginger-d:#e07e2e;--rose:#ff9aa6;--mint:#8fd3b6;--mint-d:#56b98f;--sky:#a8c6f0}
  body{min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 70% 15%, #ffe7d2, #ffd2bf 45%, #ffc4b0 100%); font-family:'Nunito',sans-serif; color:var(--ink); padding:24px}
  .frame{width:393px; height:852px; border-radius:42px; position:relative; overflow:hidden;
    background:linear-gradient(180deg,#fff7ec,#ffe9d8); box-shadow:0 30px 70px rgba(180,110,60,0.35), inset 0 0 0 6px #fff}
  .scroll{position:absolute; inset:0; overflow-y:auto; padding:26px 22px 26px; z-index:2}
  .scroll::-webkit-scrollbar{width:0}

  .top{display:flex; align-items:center; gap:11px; margin-bottom:8px}
  .mini-cat{width:44px; height:44px; border-radius:50%; background:linear-gradient(180deg,#ffd9b8,#f5a04e); position:relative; flex:0 0 auto; box-shadow:0 4px 10px rgba(224,126,46,0.3)}
  .mini-cat::before,.mini-cat::after{content:''; position:absolute; top:-5px; width:0; height:0; border-left:7px solid transparent; border-right:7px solid transparent; border-bottom:11px solid #f5a04e}
  .mini-cat::before{left:6px; transform:rotate(-18deg)} .mini-cat::after{right:6px; transform:rotate(18deg)}
  .hello .h{font-weight:700; font-size:13px; color:var(--ink-soft)}
  .hello .n{font-family:'Fredoka',sans-serif; font-weight:600; font-size:19px; color:var(--ink); margin-top:-2px}
  .heart{margin-left:auto; background:#fff; border-radius:999px; padding:7px 13px; font-weight:800; font-size:13px; color:var(--ginger-d); box-shadow:0 4px 12px rgba(224,126,46,0.18)}

  .stash{position:relative; text-align:center; border-radius:30px; padding:18px 18px 22px; margin-top:8px; overflow:hidden;
    background:linear-gradient(180deg,#fff,#fff1e2); box-shadow:0 10px 28px rgba(224,126,46,0.18)}
  .mood{display:inline-flex; align-items:center; gap:6px; background:#eafaf2; color:var(--mint-d); font-weight:800; font-size:12px; padding:5px 12px; border-radius:999px}
  .stash-cat{width:150px; height:140px; margin:6px auto 2px; display:block}
  .breathe{animation:br 3.4s ease-in-out infinite; transform-origin:50% 100%}
  @keyframes br{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
  .tail{transform-origin:84% 78%; animation:wag 2.6s ease-in-out infinite}
  @keyframes wag{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(12deg)}}
  .stash .label{font-weight:800; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-soft)}
  .stash .amt{font-family:'Fredoka',sans-serif; font-weight:700; font-size:42px; color:var(--ink); line-height:1; margin-top:4px}
  .stash .amt b{color:var(--ginger-d)}
  .stash .grow{font-weight:700; font-size:13.5px; color:var(--mint-d); margin-top:8px}
  .stash .grow b{background:#eafaf2; padding:1px 7px; border-radius:8px}

  .section-h{font-family:'Fredoka',sans-serif; font-weight:600; font-size:16px; color:var(--ink); margin:22px 4px 11px; display:flex; align-items:center; gap:7px}
  .section-h .pin{margin-left:auto; font-weight:700; font-size:13px; color:var(--ginger-d); text-decoration:none}

  .jars{display:flex; gap:11px}
  .jar{flex:1; background:#fff; border-radius:22px; padding:14px 12px 13px; text-align:center; box-shadow:0 6px 16px rgba(180,110,60,0.12); position:relative; overflow:hidden}
  .jar .emo{font-size:26px}
  .jar .jt{font-family:'Fredoka',sans-serif; font-weight:600; font-size:13.5px; color:var(--ink); margin-top:3px}
  .jar .fill{height:8px; border-radius:99px; background:#ffe3cf; margin:9px 0 6px; overflow:hidden}
  .jar .fill > i{display:block; height:100%; border-radius:99px; background:linear-gradient(90deg,var(--ginger),var(--rose))}
  .jar .jp{font-weight:800; font-size:12px; color:var(--ink-soft)}

  .feed-card{margin-top:14px; background:linear-gradient(120deg,#fff5ea,#ffe9d6); border-radius:24px; padding:16px 18px; display:flex; align-items:center; gap:14px; box-shadow:0 8px 20px rgba(224,126,46,0.14)}
  .feed-card .big{font-size:40px; line-height:1}
  .feed-card .ft{font-family:'Fredoka',sans-serif; font-weight:600; font-size:16px; color:var(--ink)}
  .feed-card .fd{font-weight:700; font-size:13px; color:var(--ink-soft); margin-top:2px; line-height:1.4}

  .streak{margin-top:14px; display:flex; align-items:center; gap:6px; justify-content:center; background:#fff; border-radius:20px; padding:13px; box-shadow:0 6px 16px rgba(180,110,60,0.1)}
  .streak .d{width:26px; height:26px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px; color:#fff; background:var(--mint)}
  .streak .d.miss{background:#ffe3cf; color:var(--ink-soft)}
  .streak .txt{font-weight:800; font-size:13px; color:var(--ink); margin-left:6px}

  .cta{display:block; width:100%; margin-top:18px; border:none; cursor:pointer; text-decoration:none; text-align:center;
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:18px; color:#fff; padding:17px; border-radius:22px;
    background:linear-gradient(180deg,var(--ginger),var(--ginger-d)); box-shadow:0 8px 20px rgba(224,126,46,0.38); transition:transform .14s}
  .cta:active{transform:scale(0.97)}
</style>
</head>
<body>
<div class="frame">
  <div class="scroll">
    <div class="top">
      <div class="mini-cat"></div>
      <div class="hello"><div class="h">welcome home,</div><div class="n">Mira &amp; Nibbles</div></div>
      <div class="heart">&#10084;&#65039; 92%</div>
    </div>

    <section class="stash">
      <span class="mood">&#128568; Nibbles is purring</span>
      <svg class="stash-cat breathe" viewBox="0 0 150 140">
        <path class="tail" d="M116 116 q34 -4 26 -40 q-4 -18 -19 -15 q12 5 10 22 q-2 22 -25 22 Z" fill="#f5a04e"/>
        <ellipse cx="75" cy="110" rx="50" ry="34" fill="#f5a04e"/>
        <ellipse cx="75" cy="120" rx="35" ry="22" fill="#ffd9b8"/>
        <circle cx="75" cy="68" r="42" fill="#f5a04e"/>
        <path d="M44 44 L37 14 L64 36 Z" fill="#f5a04e"/><path d="M46 40 L43 22 L58 36 Z" fill="#ff9aa6"/>
        <path d="M106 44 L113 14 L86 36 Z" fill="#f5a04e"/><path d="M104 40 L107 22 L92 36 Z" fill="#ff9aa6"/>
        <circle cx="50" cy="78" r="7.5" fill="#ff9aa6" opacity="0.5"/><circle cx="100" cy="78" r="7.5" fill="#ff9aa6" opacity="0.5"/>
        <!-- happy closed eyes -->
        <path d="M54 66 q6 7 12 0 M84 66 q6 7 12 0" stroke="#3d2b1c" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M71 80 h8 l-4 5 Z" fill="#ff7a8a"/>
        <path d="M75 85 q-6 6 -12 3 M75 85 q6 6 12 3" stroke="#3d2b1c" stroke-width="2.2" fill="none" stroke-linecap="round"/>
        <path d="M44 74 H24 M46 81 H28 M106 74 H126 M104 81 H122" stroke="#d98f54" stroke-width="1.5" stroke-linecap="round"/>
        <!-- coin pile -->
        <ellipse cx="75" cy="136" rx="46" ry="7" fill="#ffd24a" opacity="0.5"/>
        <circle cx="55" cy="132" r="8" fill="#ffd24a" stroke="#e0a92e" stroke-width="2"/>
        <circle cx="95" cy="132" r="8" fill="#ffd24a" stroke="#e0a92e" stroke-width="2"/>
        <circle cx="75" cy="135" r="8" fill="#ffd24a" stroke="#e0a92e" stroke-width="2"/>
      </svg>
      <div class="label">your stash</div>
      <div class="amt">$<b>9,418</b></div>
      <div class="grow">grew <b>+$54 this week</b> &#127807; nice!</div>
    </section>

    <div class="section-h">Treat jars <a class="pin" href="#">+ new jar</a></div>
    <div class="jars">
      <div class="jar"><div class="emo">&#127968;</div><div class="jt">Cozy den</div><div class="fill"><i style="width:24%"></i></div><div class="jp">$14.2k of $60k</div></div>
      <div class="jar"><div class="emo">&#127907;</div><div class="jt">Naps fund</div><div class="fill"><i style="width:6%"></i></div><div class="jp">$9.4k of $500k</div></div>
    </div>

    <div class="feed-card">
      <div class="big">&#129385;</div>
      <div><div class="ft">Today's treat</div><div class="fd">Pop $25 in the jar to keep Nibbles' streak alive.</div></div>
    </div>

    <div class="section-h">Fed this week</div>
    <div class="streak">
      <div class="d">M</div><div class="d">T</div><div class="d">W</div><div class="d">T</div><div class="d">F</div><div class="d miss">S</div><div class="d miss">S</div>
      <div class="txt">11&#128293;</div>
    </div>

    <a class="cta" href="#">Feed Nibbles &#129385;</a>
  </div>
</div>
</body>
</html>
