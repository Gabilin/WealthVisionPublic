<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nibbles — Adopt your savings buddy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --cream:#fff7ec; --peach:#ffe3cf; --milk:#fffdf8; --ink:#5b4636; --ink-soft:#9b8978;
    --ginger:#f5a04e; --ginger-d:#e07e2e; --rose:#ff9aa6; --mint:#8fd3b6; --sky:#a8c6f0;
  }
  body{min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 30% 20%, #ffe7d2, #ffd9c2 40%, #ffcdb6 100%);
    font-family:'Nunito',sans-serif; color:var(--ink); padding:24px}
  .frame{width:393px; height:852px; border-radius:42px; position:relative; overflow:hidden;
    background:linear-gradient(180deg, var(--cream), var(--peach));
    box-shadow:0 30px 70px rgba(180,110,60,0.35), inset 0 0 0 6px #fff;}
  /* floating paw prints */
  .paw{position:absolute; color:rgba(245,160,78,0.13); font-size:26px; pointer-events:none}
  .scroll{position:absolute; inset:0; overflow-y:auto; padding:30px 26px 26px; z-index:2; text-align:center}
  .scroll::-webkit-scrollbar{width:0}

  .pill{display:inline-flex; align-items:center; gap:7px; background:#fff; border-radius:999px; padding:7px 15px;
    font-weight:800; font-size:12px; letter-spacing:0.02em; color:var(--ginger-d);
    box-shadow:0 4px 12px rgba(224,126,46,0.18)}
  .pill .dot{width:8px;height:8px;border-radius:50%;background:var(--mint);box-shadow:0 0 0 3px rgba(143,211,182,0.3)}

  h1{font-family:'Fredoka',sans-serif; font-weight:700; font-size:30px; line-height:1.12; margin:18px 0 6px; color:var(--ink)}
  h1 b{color:var(--ginger-d)}
  .sub{font-size:15.5px; color:var(--ink-soft); line-height:1.5; font-weight:600; max-width:300px; margin:0 auto}

  /* ---- the cat ---- */
  .cat-stage{position:relative; width:210px; height:200px; margin:14px auto 8px}
  .blob{position:absolute; left:50%; bottom:6px; transform:translateX(-50%); width:180px; height:42px; border-radius:50%;
    background:radial-gradient(closest-side, rgba(224,126,46,0.18), transparent); }
  .cat{position:absolute; left:50%; bottom:18px; transform:translateX(-50%); width:170px; height:180px;
    animation:breathe 3.4s ease-in-out infinite; transform-origin:50% 100%}
  @keyframes breathe{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.025)}}
  .tail{transform-origin:88% 80%; animation:wag 2.8s ease-in-out infinite}
  @keyframes wag{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(10deg)}}
  .lid{transform-origin:center; animation:blink 4.2s infinite}
  @keyframes blink{0%,94%,100%{transform:scaleY(0)}96%,98%{transform:scaleY(1)}}

  .name-wrap{margin:6px auto 2px; max-width:280px}
  .name-label{font-weight:800; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:7px}
  .name-input{width:100%; text-align:center; border:none; outline:none; background:#fff; border-radius:18px; padding:13px;
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:19px; color:var(--ink);
    box-shadow:0 4px 14px rgba(224,126,46,0.16), inset 0 0 0 2px var(--peach)}
  .name-input:focus{box-shadow:0 4px 14px rgba(224,126,46,0.25), inset 0 0 0 2px var(--ginger)}

  .treats-label{font-weight:800; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-soft); margin:22px 0 12px}
  .treats{display:grid; grid-template-columns:1fr 1fr; gap:11px}
  .treat{cursor:pointer; background:#fff; border-radius:20px; padding:15px 12px 13px; border:2.5px solid transparent;
    box-shadow:0 5px 14px rgba(180,110,60,0.12); transition:transform .16s cubic-bezier(.2,.8,.2,1), border-color .16s;
    display:flex; flex-direction:column; align-items:center; gap:7px}
  .treat:hover{transform:translateY(-3px)}
  .treat.on{border-color:var(--ginger); background:linear-gradient(180deg,#fff,#fff3e6)}
  .treat .emo{font-size:30px; filter:drop-shadow(0 3px 4px rgba(180,110,60,0.2))}
  .treat .tt{font-family:'Fredoka',sans-serif; font-weight:600; font-size:14.5px; color:var(--ink); line-height:1.1}
  .treat .td{font-size:12px; color:var(--ink-soft); font-weight:600}

  .cta{display:block; width:100%; margin:22px 0 6px; border:none; cursor:pointer; text-decoration:none;
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:18px; color:#fff; padding:17px; border-radius:22px;
    background:linear-gradient(180deg,var(--ginger),var(--ginger-d));
    box-shadow:0 8px 20px rgba(224,126,46,0.4); transition:transform .14s}
  .cta:active{transform:scale(0.97)}
  .skip{font-weight:700; font-size:14px; color:var(--ink-soft); text-decoration:none}
</style>
</head>
<body>
<div class="frame">
  <span class="paw" style="top:80px;left:24px;transform:rotate(-20deg)">&#128062;</span>
  <span class="paw" style="top:160px;right:30px;transform:rotate(18deg)">&#128062;</span>
  <span class="paw" style="bottom:120px;left:36px;transform:rotate(8deg)">&#128062;</span>
  <div class="scroll">
    <span class="pill"><span class="dot"></span>your money, but cuter</span>

    <div class="cat-stage">
      <div class="blob"></div>
      <svg class="cat" viewBox="0 0 170 180">
        <!-- tail -->
        <path class="tail" d="M132 150 q40 -6 30 -48 q-4 -22 -22 -18 q14 6 12 26 q-2 28 -30 28 Z" fill="#f5a04e"/>
        <!-- body -->
        <ellipse cx="85" cy="138" rx="56" ry="40" fill="#f5a04e"/>
        <ellipse cx="85" cy="150" rx="40" ry="26" fill="#ffd9b8"/>
        <!-- head -->
        <circle cx="85" cy="86" r="50" fill="#f5a04e"/>
        <!-- ears -->
        <path d="M48 56 L40 18 L74 44 Z" fill="#f5a04e"/><path d="M50 50 L46 28 L66 44 Z" fill="#ff9aa6"/>
        <path d="M122 56 L130 18 L96 44 Z" fill="#f5a04e"/><path d="M120 50 L124 28 L104 44 Z" fill="#ff9aa6"/>
        <!-- stripes -->
        <path d="M85 40 v14 M68 44 l5 12 M102 44 l-5 12" stroke="#e07e2e" stroke-width="4" stroke-linecap="round" fill="none"/>
        <!-- cheeks -->
        <circle cx="58" cy="98" r="9" fill="#ff9aa6" opacity="0.55"/><circle cx="112" cy="98" r="9" fill="#ff9aa6" opacity="0.55"/>
        <!-- eyes -->
        <g><ellipse cx="68" cy="84" rx="7" ry="9" fill="#3d2b1c"/><circle cx="70" cy="80" r="2.4" fill="#fff"/>
           <ellipse class="lid" cx="68" cy="84" rx="8" ry="10" fill="#f5a04e"/></g>
        <g><ellipse cx="102" cy="84" rx="7" ry="9" fill="#3d2b1c"/><circle cx="104" cy="80" r="2.4" fill="#fff"/>
           <ellipse class="lid" cx="102" cy="84" rx="8" ry="10" fill="#f5a04e"/></g>
        <!-- nose + mouth -->
        <path d="M81 98 h8 l-4 5 Z" fill="#ff7a8a"/>
        <path d="M85 103 q-6 7 -13 4 M85 103 q6 7 13 4" stroke="#3d2b1c" stroke-width="2.4" fill="none" stroke-linecap="round"/>
        <!-- whiskers -->
        <path d="M52 92 H30 M54 100 H34 M118 92 H140 M116 100 H136" stroke="#d98f54" stroke-width="1.6" stroke-linecap="round"/>
        <!-- coin under paw -->
        <circle cx="85" cy="170" r="11" fill="#ffd24a" stroke="#e0a92e" stroke-width="2.5"/>
        <text x="85" y="175" font-size="12" font-weight="800" fill="#b07d12" text-anchor="middle" font-family="Fredoka">$</text>
      </svg>
    </div>

    <h1>Meet <b>Nibbles</b>,<br>your savings buddy</h1>
    <p class="sub">Feed Nibbles a little each week. The more you save, the rounder &amp; happier they get.</p>

    <div class="name-wrap">
      <div class="name-label">Name your buddy</div>
      <input class="name-input" value="Nibbles" aria-label="Cat name">
    </div>

    <div class="treats-label">What's Nibbles saving up for?</div>
    <div class="treats">
      <button class="treat on" onclick="pick(this)"><span class="emo">&#127968;</span><span class="tt">A cozy den</span><span class="td">house fund</span></button>
      <button class="treat" onclick="pick(this)"><span class="emo">&#127907;</span><span class="tt">Endless naps</span><span class="td">freedom fund</span></button>
      <button class="treat" onclick="pick(this)"><span class="emo">&#127881;</span><span class="tt">A big trip</span><span class="td">adventure jar</span></button>
      <button class="treat" onclick="pick(this)"><span class="emo">&#129508;</span><span class="tt">Rainy days</span><span class="td">safety net</span></button>
    </div>

    <a class="cta" href="dashboard.html">Adopt Nibbles &#128062;</a>
    <a class="skip" href="dashboard.html">maybe later</a>
  </div>
</div>
<script>function pick(el){document.querySelectorAll('.treat').forEach(t=>t.classList.remove('on'));el.classList.add('on');}</script>
</body>
</html>
