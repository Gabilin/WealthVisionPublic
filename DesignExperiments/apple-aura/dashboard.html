<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura — Summary</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --label:#1c1c1e; --secondary:#6b6b70; --tertiary:#9a9aa0;
    --blue:#0a84ff; --pink:#ff375f; --green:#30d158; --cyan:#32ade6; --indigo:#5856d6; --orange:#ff9f0a; --purple:#bf5af2;
    --glass:rgba(255,255,255,0.52); --glass-stroke:rgba(255,255,255,0.65); --hair:rgba(60,60,67,0.12);
  }
  body{min-height:100vh; display:flex; align-items:center; justify-content:center; background:#d7d8de; padding:24px;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,"Segoe UI",sans-serif; color:var(--label); -webkit-font-smoothing:antialiased}
  .frame{width:393px; height:852px; border-radius:54px; position:relative; overflow:hidden;
    background:
      radial-gradient(40% 30% at 12% 8%, rgba(10,132,255,0.20), transparent 70%),
      radial-gradient(44% 34% at 90% 5%, rgba(255,55,95,0.18), transparent 70%),
      radial-gradient(52% 44% at 88% 64%, rgba(48,209,88,0.16), transparent 72%),
      radial-gradient(48% 40% at 6% 80%, rgba(88,86,214,0.17), transparent 72%),
      radial-gradient(40% 30% at 50% 46%, rgba(50,173,230,0.10), transparent 70%),
      #eef0f5;
    box-shadow:0 50px 110px rgba(40,40,60,0.4), inset 0 0 0 1.5px rgba(255,255,255,0.5)}
  .notch{position:absolute; top:11px; left:50%; transform:translateX(-50%); width:122px; height:34px; background:#000; border-radius:20px; z-index:20}
  .statusbar{position:absolute; top:15px; left:0; right:0; display:flex; justify-content:space-between; padding:0 30px; font-size:14px; font-weight:600; z-index:19}
  .scroll{position:absolute; inset:0; overflow-y:auto; padding:62px 18px 112px; z-index:5}
  .scroll::-webkit-scrollbar{width:0}

  .nav{display:flex; align-items:flex-end; justify-content:space-between; padding:6px 4px 14px}
  .nav .date{font-size:14px; font-weight:600; color:var(--secondary); letter-spacing:0.01em}
  .nav .title{font-size:34px; font-weight:700; letter-spacing:-0.022em; line-height:1; margin-top:2px}
  .nav .avatar{width:38px; height:38px; border-radius:50%; flex:0 0 auto; background:linear-gradient(160deg,#5856d6,#0a84ff); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:600; font-size:15px; box-shadow:0 4px 12px rgba(88,86,214,0.4)}

  .card{background:var(--glass); -webkit-backdrop-filter:blur(30px) saturate(180%); backdrop-filter:blur(30px) saturate(180%);
    border-radius:24px; border:0.5px solid var(--glass-stroke); box-shadow:0 1px 0 rgba(255,255,255,0.6) inset, 0 12px 36px rgba(30,30,50,0.10); padding:18px; margin-bottom:14px}
  .card-h{display:flex; align-items:center; justify-content:space-between; margin-bottom:4px}
  .card-h .ct{font-size:13px; font-weight:700; letter-spacing:0.03em; text-transform:uppercase; color:var(--secondary)}
  .card-h .ca{font-size:14px; font-weight:500; color:var(--blue); text-decoration:none}

  /* rings hero */
  .rings-wrap{display:flex; align-items:center; gap:18px; margin-top:8px}
  .rings{width:142px; height:142px; flex:0 0 auto}
  .rings circle{fill:none; stroke-width:13; stroke-linecap:round; transform:rotate(-90deg); transform-origin:50% 50%}
  .legend{flex:1; display:flex; flex-direction:column; gap:13px}
  .lg{display:flex; align-items:center; gap:10px}
  .lg .sw{width:11px; height:11px; border-radius:50%; flex:0 0 auto}
  .lg .ln{font-size:15px; font-weight:600; letter-spacing:-0.01em}
  .lg .lv{margin-left:auto; font-size:15px; font-weight:600; font-variant-numeric:tabular-nums}
  .lg .lv small{color:var(--tertiary); font-weight:500}

  /* net worth */
  .nw-top{display:flex; align-items:flex-end; justify-content:space-between}
  .nw .amt{font-size:40px; font-weight:700; letter-spacing:-0.03em; line-height:1; margin-top:5px; font-variant-numeric:tabular-nums}
  .nw .delta{display:inline-flex; align-items:center; gap:4px; font-size:14px; font-weight:600; color:var(--green); background:rgba(48,209,88,0.14); padding:5px 9px; border-radius:9px}
  .nw .spark{margin-top:14px}
  .nw .spark svg{width:100%; height:56px; display:block}

  .hl{display:grid; grid-template-columns:1fr 1fr; gap:14px}
  .hl .card{margin:0; padding:16px}
  .hl .hi-ic{width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center; margin-bottom:10px}
  .hl .hi-ic svg{width:18px; height:18px; stroke:#fff; stroke-width:2.2; fill:none}
  .hl .hk{font-size:13px; color:var(--secondary); font-weight:500}
  .hl .hv{font-size:23px; font-weight:700; letter-spacing:-0.02em; margin-top:2px; font-variant-numeric:tabular-nums}
  .hl .hsub{font-size:12.5px; color:var(--tertiary); margin-top:3px}
  .hl .bars{display:flex; align-items:flex-end; gap:4px; height:26px; margin-top:9px}
  .hl .bars i{flex:1; background:var(--blue); border-radius:3px; opacity:0.85}

  .sec-h{display:flex; align-items:baseline; justify-content:space-between; margin:20px 6px 11px}
  .sec-h .st{font-size:21px; font-weight:700; letter-spacing:-0.02em}
  .sec-h .sa{font-size:15px; font-weight:500; color:var(--blue); text-decoration:none}

  .glist{background:var(--glass); -webkit-backdrop-filter:blur(30px) saturate(180%); backdrop-filter:blur(30px) saturate(180%);
    border-radius:22px; border:0.5px solid var(--glass-stroke); box-shadow:0 1px 0 rgba(255,255,255,0.6) inset, 0 12px 36px rgba(30,30,50,0.10); overflow:hidden}
  .grow{display:flex; align-items:center; gap:13px; padding:13px 15px; position:relative; text-decoration:none; color:var(--label)}
  .grow + .grow::before{content:''; position:absolute; top:0; left:56px; right:0; height:0.5px; background:var(--hair)}
  .grow .gi{width:34px; height:34px; border-radius:10px; flex:0 0 auto; display:flex; align-items:center; justify-content:center}
  .grow .gi svg{width:19px; height:19px; stroke:#fff; stroke-width:2.2; fill:none}
  .grow .gb{flex:1; min-width:0}
  .grow .gn{font-size:16px; font-weight:600; letter-spacing:-0.01em}
  .grow .gt{height:5px; border-radius:99px; background:rgba(60,60,67,0.12); margin-top:7px; overflow:hidden}
  .grow .gt > i{display:block; height:100%; border-radius:99px}
  .grow .gv{text-align:right; flex:0 0 auto}
  .grow .gp{font-size:15px; font-weight:600; font-variant-numeric:tabular-nums}
  .grow .gs{font-size:12px; color:var(--tertiary)}
  .grow .chev{color:var(--tertiary); font-size:19px; margin-left:2px}

  /* floating liquid-glass tab bar */
  .tabbar{position:absolute; left:50%; transform:translateX(-50%); bottom:calc(18px + env(safe-area-inset-bottom)); z-index:30;
    display:flex; gap:4px; padding:7px; border-radius:28px;
    background:rgba(255,255,255,0.55); -webkit-backdrop-filter:blur(34px) saturate(200%); backdrop-filter:blur(34px) saturate(200%);
    border:0.5px solid rgba(255,255,255,0.7); box-shadow:0 1px 0 rgba(255,255,255,0.8) inset, 0 10px 34px rgba(30,30,50,0.22)}
  .tab{width:62px; padding:8px 0 6px; display:flex; flex-direction:column; align-items:center; gap:3px; text-decoration:none; color:var(--tertiary); border-radius:21px}
  .tab svg{width:24px; height:24px; stroke:currentColor; stroke-width:2; fill:none}
  .tab span{font-size:10.5px; font-weight:600; letter-spacing:0.01em}
  .tab.on{color:var(--blue); background:rgba(10,132,255,0.12)}
</style>
</head>
<body>
<div class="frame">
  <div class="notch"></div>
  <div class="statusbar"><span>9:41</span><span>&#9679;&#9679;&#9679; &#9099;</span></div>
  <div class="scroll">
    <div class="nav">
      <div><div class="date">Tuesday, 23 June</div><div class="title">Summary</div></div>
      <div class="avatar">M</div>
    </div>

    <section class="card">
      <div class="card-h"><span class="ct">Goals</span><a class="ca" href="#">Show All</a></div>
      <div class="rings-wrap">
        <svg class="rings" viewBox="0 0 142 142">
          <circle cx="71" cy="71" r="58" stroke="rgba(255,55,95,0.18)"/>
          <circle cx="71" cy="71" r="58" stroke="#ff375f" pathLength="100" stroke-dasharray="100" stroke-dashoffset="94"/>
          <circle cx="71" cy="71" r="42" stroke="rgba(48,209,88,0.18)"/>
          <circle cx="71" cy="71" r="42" stroke="#30d158" pathLength="100" stroke-dasharray="100" stroke-dashoffset="76"/>
          <circle cx="71" cy="71" r="26" stroke="rgba(50,173,230,0.18)"/>
          <circle cx="71" cy="71" r="26" stroke="#32ade6" pathLength="100" stroke-dasharray="100" stroke-dashoffset="32"/>
        </svg>
        <div class="legend">
          <div class="lg"><span class="sw" style="background:#ff375f"></span><span class="ln">Freedom</span><span class="lv">6<small>%</small></span></div>
          <div class="lg"><span class="sw" style="background:#30d158"></span><span class="ln">Home</span><span class="lv">24<small>%</small></span></div>
          <div class="lg"><span class="sw" style="background:#32ade6"></span><span class="ln">Safety net</span><span class="lv">68<small>%</small></span></div>
        </div>
      </div>
    </section>

    <section class="card nw">
      <div class="nw-top">
        <div><div class="card-h"><span class="ct">Net Worth</span></div><div class="amt">$9,418</div></div>
        <span class="delta">&#9650; $54 &#183; 7d</span>
      </div>
      <div class="spark">
        <svg viewBox="0 0 320 56" preserveAspectRatio="none">
          <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0a84ff" stop-opacity="0.28"/><stop offset="1" stop-color="#0a84ff" stop-opacity="0"/></linearGradient></defs>
          <path d="M0 48 C40 46 60 40 100 36 C140 32 160 26 200 22 C240 18 270 12 320 6 L320 56 L0 56 Z" fill="url(#sg)"/>
          <path d="M0 48 C40 46 60 40 100 36 C140 32 160 26 200 22 C240 18 270 12 320 6" fill="none" stroke="#0a84ff" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
    </section>

    <div class="hl">
      <div class="card">
        <div class="hi-ic" style="background:linear-gradient(160deg,#ff9f0a,#ffb340)"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></div>
        <div class="hk">Monthly</div><div class="hv">$200</div><div class="hsub">Auto every 1st</div>
        <div class="bars"><i style="height:40%"></i><i style="height:55%"></i><i style="height:48%"></i><i style="height:70%"></i><i style="height:62%"></i><i style="height:85%"></i></div>
      </div>
      <div class="card">
        <div class="hi-ic" style="background:linear-gradient(160deg,#5856d6,#8a89e6)"><svg viewBox="0 0 24 24" stroke-linejoin="round"><path d="M4 18l5-6 4 3 7-9"/></svg></div>
        <div class="hk">At 65</div><div class="hv">$1.21M</div><div class="hsub">if you keep this up</div>
        <svg viewBox="0 0 130 30" style="margin-top:9px;width:100%;height:26px"><path d="M2 26 C30 24 50 18 75 12 C100 6 115 4 128 2" fill="none" stroke="#5856d6" stroke-width="2.4" stroke-linecap="round"/></svg>
      </div>
    </div>

    <div class="sec-h"><span class="st">Your Goals</span><a class="sa" href="#">Edit</a></div>
    <div class="glist">
      <a class="grow" href="#">
        <span class="gi" style="background:linear-gradient(160deg,#ff375f,#ff6482)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2"/></svg></span>
        <span class="gb"><span class="gn">Freedom</span><span class="gt"><i style="width:6%;background:#ff375f"></i></span></span>
        <span class="gv"><div class="gp">$9,418</div><div class="gs">of $500k</div></span><span class="chev">&#8250;</span>
      </a>
      <a class="grow" href="#">
        <span class="gi" style="background:linear-gradient(160deg,#0a84ff,#409cff)"><svg viewBox="0 0 24 24" stroke-linejoin="round"><path d="M4 11l8-6 8 6v8H4z"/></svg></span>
        <span class="gb"><span class="gn">Home deposit</span><span class="gt"><i style="width:24%;background:#0a84ff"></i></span></span>
        <span class="gv"><div class="gp">$14,200</div><div class="gs">of $60k</div></span><span class="chev">&#8250;</span>
      </a>
      <a class="grow" href="#">
        <span class="gi" style="background:linear-gradient(160deg,#30d158,#5be07a)"><svg viewBox="0 0 24 24"><path d="M12 3v18M5 10l7-7 7 7"/></svg></span>
        <span class="gb"><span class="gn">Safety net</span><span class="gt"><i style="width:68%;background:#30d158"></i></span></span>
        <span class="gv"><div class="gp">$10,200</div><div class="gs">of $15k</div></span><span class="chev">&#8250;</span>
      </a>
    </div>
  </div>

  <nav class="tabbar">
    <a class="tab on" href="#"><svg viewBox="0 0 24 24"><path d="M4 12l8-8 8 8M6 10v9h12v-9"/></svg><span>Summary</span></a>
    <a class="tab" href="#"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg><span>Goals</span></a>
    <a class="tab" href="#"><svg viewBox="0 0 24 24"><path d="M4 19V5M4 19h16M8 16v-5M12 16V8M16 16v-3"/></svg><span>Invest</span></a>
    <a class="tab" href="onboarding.html"><svg viewBox="0 0 24 24"><circle cx="6" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="18" cy="12" r="1.6"/></svg><span>More</span></a>
  </nav>
</div>
</body>
</html>
