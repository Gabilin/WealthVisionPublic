<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WealthVision — Your Goal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="proto-shell.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080a0e;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
      font-family: 'Manrope', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    .device-frame {
      width: 393px; height: 852px; border-radius: 47px; overflow: hidden;
      position: relative; background: #10141a;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.3), 0 25px 60px rgba(0,0,0,0.5), 0 50px 120px rgba(0,0,0,0.25);
    }
    .gd {
      background: var(--app-bg); color: var(--text-hi);
      height: 100%; display: flex; flex-direction: column;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    /* teal ambience (goal = brand teal) */
    .gd::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 260px;
      background: radial-gradient(120% 100% at 50% 0%, rgba(25, 184, 166,0.14), transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .gd-top {
      position: relative; z-index: 2;
      padding: 22px 18px 6px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-arrow {
      width: 38px; height: 38px; border-radius: 12px; flex: 0 0 auto;
      border: 1px solid var(--hairline); background: var(--surface); color: var(--text-mid);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: transform 140ms ease;
    }
    .back-arrow:active { transform: scale(0.9); }
    .gd-top-title { font-size: 15px; font-weight: 700; color: var(--text-hi); letter-spacing: -0.01em; }

    .gd-scroll { position: relative; z-index: 1; flex: 1; overflow-y: auto; padding: 8px 18px 28px; }
    .gd-scroll::-webkit-scrollbar { width: 0; }

    /* hero */
    .gd-hero { text-align: center; padding: 14px 6px 4px; }
    .gd-ic {
      width: 64px; height: 64px; border-radius: 20px; margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(25, 184, 166,0.14); color: #19b8a6;
      border: 1px solid rgba(25, 184, 166,0.26);
    }
    .gd-ic svg { width: 32px; height: 32px; }
    .gd-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #5ad7c4; }
    .gd-name { font-size: 26px; font-weight: 900; letter-spacing: -0.02em; color: var(--text-hi); margin-top: 6px; line-height: 1.15; }
    .gd-target { font-size: 15px; color: var(--text-mid); margin-top: 8px; }
    .gd-target b { color: var(--text-hi); font-weight: 700; }
    .gd-finance { font-size: 12.5px; color: var(--text-lo); margin-top: 6px; }
    .gd-finance b { color: var(--text-mid); font-weight: 700; }

    /* progress */
    .gd-prog-wrap { margin-top: 22px; }
    .gd-prog-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
    .gd-prog-label { font-size: 12.5px; color: var(--text-mid); }
    .gd-prog-pct { font-size: 13px; font-weight: 800; color: #19b8a6; font-variant-numeric: tabular-nums; }
    .gd-bar { height: 9px; border-radius: 99px; background: rgba(127,127,160,0.18); overflow: hidden; }
    .gd-bar > i { display: block; height: 100%; width: 0; border-radius: 99px; background: linear-gradient(90deg,#19b8a6,#4cd0bf);
      transition: width 800ms cubic-bezier(0.16,1,0.3,1); }
    .gd-prog-foot { font-size: 11.5px; color: var(--text-lo); margin-top: 7px; }

    /* chart */
    .gd-card {
      margin-top: 20px; border-radius: 20px; padding: 16px;
      background: linear-gradient(160deg, var(--glass-top), var(--glass-bot));
      -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
      border: 1px solid var(--hairline);
      box-shadow: inset 0 1px 0 var(--hi-glow), var(--shadow);
    }
    .gd-card-title { font-size: 12.5px; font-weight: 700; color: var(--text-mid); letter-spacing: 0.01em; }
    .gd-chart-wrap { height: 132px; margin-top: 10px; position: relative; }
    .gd-chart-wrap canvas { width: 100%; height: 100%; display: block; }

    /* stat grid */
    .gd-stats { margin-top: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .gd-stat {
      border-radius: 16px; padding: 14px;
      background: var(--surface); border: 1px solid var(--hairline);
    }
    .gd-stat .k { font-size: 11px; color: var(--text-mid); }
    .gd-stat .v { font-size: 18px; font-weight: 800; color: var(--text-hi); margin-top: 4px; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

    /* actions */
    .gd-actions { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
    .gd-btn {
      width: 100%; border: none; cursor: pointer; text-decoration: none;
      padding: 15px; border-radius: 15px; font-size: 15px; font-weight: 800; letter-spacing: -0.01em;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform 140ms ease;
    }
    .gd-btn:active { transform: scale(0.97); }
    .gd-btn svg { width: 18px; height: 18px; }
    .gd-btn-primary { background: #19b8a6; color: #042b25; box-shadow: 0 12px 26px rgba(25, 184, 166,0.26); }
    .gd-btn-ghost { background: var(--surface); color: var(--text-hi); border: 1px solid var(--hairline); }
    .gd-btn-link { background: transparent; color: var(--text-mid); font-weight: 700; box-shadow: none; padding: 10px; }
    .gd-btn-link:active { transform: scale(0.97); }

    /* pinned action footer so the primary CTA is always reachable */
    .gd-foot {
      position: relative; z-index: 3; flex: 0 0 auto;
      padding: 12px 18px calc(14px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, var(--app-bg) 72%, transparent);
      border-top: 1px solid var(--hairline);
      display: flex; flex-direction: column; gap: 9px;
    }
    .gd-foot .gd-btn { padding: 14px; }
    .gd-foot-row { display: flex; gap: 9px; }
    .gd-foot-row .gd-btn { flex: 1 1 0; min-width: 0; }

    /* onboarding celebration + next steps */
    .gd-celebrate {
      margin-top: 18px; border-radius: 18px; padding: 16px 16px 14px;
      background: linear-gradient(150deg, rgba(25, 184, 166,0.16), rgba(25, 184, 166,0.04));
      border: 1px solid rgba(25, 184, 166,0.24);
    }
    .gd-celebrate-eyebrow {
      font-size: 11px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: #5ad7c4;
      display: flex; align-items: center; gap: 7px;
    }
    .gd-celebrate-eyebrow svg { width: 14px; height: 14px; }
    .gd-celebrate-title { font-size: 17px; font-weight: 800; color: var(--text-hi); margin-top: 6px; letter-spacing: -0.01em; }
    .gd-celebrate-sub { font-size: 13px; color: var(--text-mid); margin-top: 5px; line-height: 1.45; }

    /* empty state */
    .gd-empty { text-align: center; padding: 80px 26px 0; }
    .gd-empty .gd-ic { background: rgba(127,127,160,0.14); color: var(--text-mid); border-color: var(--hairline); }
    .gd-empty-title { font-size: 20px; font-weight: 800; color: var(--text-hi); margin-top: 14px; letter-spacing: -0.01em; }
    .gd-empty-sub { font-size: 14px; color: var(--text-mid); margin-top: 8px; line-height: 1.45; }
    .gd-empty .gd-btn { margin-top: 22px; }
  </style>
</head>
<body>
  <div class="device-frame">
    <div class="gd">
      <div class="gd-top">
        <button class="back-arrow" id="backBtn" aria-label="Back">←</button>
        <div class="gd-top-title">Your goal</div>
        <div style="width:38px"></div>
      </div>

      <div class="gd-scroll" id="gdScroll">
        <!-- populated by JS -->
      </div>
      <div class="gd-foot" id="gdFoot"><!-- actions, populated by JS --></div>
    </div>
  </div>

  <script src="proto-shell.js"></script>
  <script>
    (function () {
      var S = window.WVShell;
      var RATE = 0.07;
      var scroll = document.getElementById('gdScroll');
      var foot = document.getElementById('gdFoot');

      function esc(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }
      function money(v) { return '$' + Math.round(v).toLocaleString('en-US'); }

      // Years to reach a target with a given monthly contribution (FV of annuity)
      function yearsToTarget(monthly, target) {
        if (monthly <= 0 || target <= 0) return Infinity;
        var mr = RATE / 12;
        var n = Math.log(1 + (target * mr) / monthly) / Math.log(1 + mr);
        return n / 12;
      }
      // Future value after a number of months
      function fvAt(monthly, months) {
        var mr = RATE / 12;
        return monthly * ((Math.pow(1 + mr, months) - 1) / mr);
      }

      var st = S.getState();
      var g = (S.getActiveGoal) ? S.getActiveGoal() : st.goal;
      var activeIdx = (S.getActiveGoalIndex) ? S.getActiveGoalIndex() : 0;

      // Honor a return assumption chosen in the Path-to-Goal step (falls back to 7%).
      if (g && typeof g.returnRate === 'number' && g.returnRate > 0) RATE = g.returnRate;

      var fromParam = new URLSearchParams(window.location.search).get('from');
      var onboarding = fromParam === 'onboarding';
      var builder = fromParam === 'builder';
      var payoff = onboarding || builder; // celebratory “you’re all set” framing
      if (payoff) {
        var topTitle = document.querySelector('.gd-top-title');
        if (topTitle) topTitle.textContent = "You're all set";
      }
      if (!g || !g.target) {
        if (foot) foot.style.display = 'none';
        scroll.innerHTML =
          '<div class="gd-empty">' +
          '<div class="gd-ic">' + S.icon('target') + '</div>' +
          '<div class="gd-empty-title">No goal yet</div>' +
          '<div class="gd-empty-sub">Set a savings goal and we\'ll track your path to it right here.</div>' +
          '<a class="gd-btn gd-btn-primary" href="screen7.html">Create a goal</a>' +
          '</div>';
        return;
      }

      var monthly = g.monthly || st.monthly || 0;
      var years = g.years;
      if ((years === null || years === undefined) && monthly > 0) {
        var yt = yearsToTarget(monthly, g.target);
        years = isFinite(yt) ? Math.round(yt * 10) / 10 : null;
      }

      // "Where you are" — assume one month in (prototype has no real balance yet)
      var monthsIn = 1;
      var contributed = monthly > 0 ? fvAt(monthly, monthsIn) : 0;
      var pct = g.target > 0 ? Math.max(0, Math.min(100, contributed / g.target * 100)) : 0;

      // Estimated completion date
      var completion = '—';
      if (years && isFinite(years)) {
        var d = new Date();
        d.setMonth(d.getMonth() + Math.round(years * 12));
        completion = d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
      }

      var timeline = years ? ('~' + years + ' years') : 'Set a monthly amount';
      var monthlyLabel = monthly > 0 ? (money(monthly) + '/mo') : 'Not set';

      var eyebrowLabel = payoff ? 'Your new goal' : 'Savings goal';
      var celebrateHtml = payoff
        ? '<div class="gd-celebrate">' +
            '<div class="gd-celebrate-eyebrow">' + S.icon('sprout') + 'Goal created</div>' +
            '<div class="gd-celebrate-title">Nice — your plan is in motion.</div>' +
            '<div class="gd-celebrate-sub">Here\'s how ' + esc(g.name) + ' grows over time. Play with the numbers in the Simulator, or learn the moves that get you there faster.</div>' +
          '</div>'
        : '';

      var bolt = S.icon('spark');
      var actionsHtml = payoff
        ? '<a class="gd-btn gd-btn-primary" id="simBtn">' + S.icon('spark') + 'Try it in the Simulator</a>' +
          '<div class="gd-foot-row">' +
            '<a class="gd-btn gd-btn-ghost" href="accelerate.html">' + bolt + 'Reach it faster</a>' +
            '<a class="gd-btn gd-btn-ghost" href="learn.html">' + S.icon('learn') + 'Learn</a>' +
          '</div>' +
          '<a class="gd-btn gd-btn-link" href="dashboard.html">Go to my dashboard &#8594;</a>'
        : '<a class="gd-btn gd-btn-primary" id="simBtn">' + S.icon('spark') + 'Open in Simulator</a>' +
          '<div class="gd-foot-row">' +
            '<a class="gd-btn gd-btn-ghost" href="accelerate.html">' + bolt + 'Reach it faster</a>' +
            '<a class="gd-btn gd-btn-ghost" href="screen7.html?edit=' + activeIdx + '">Edit goal</a>' +
          '</div>';

      scroll.innerHTML =
        '<div class="gd-hero">' +
          '<div class="gd-ic">' + S.icon('target') + '</div>' +
          '<div class="gd-eyebrow">' + eyebrowLabel + '</div>' +
          '<div class="gd-name">' + esc(g.name) + '</div>' +
          '<div class="gd-target">Target <b>' + money(g.target) + '</b></div>' +
          (g.financedAmount
            ? '<div class="gd-finance"><b>' + g.downPct + '%</b> down on a ' + money(g.price) + ' '
              + (g.id === 'car' ? 'car' : 'home') + ' \u00b7 ' + money(g.financedAmount) + ' via ' + g.restTerm + '</div>'
            : '') +
        '</div>' +

        celebrateHtml +

        '<div class="gd-prog-wrap">' +
          '<div class="gd-prog-row">' +
            '<span class="gd-prog-label">Progress</span>' +
            '<span class="gd-prog-pct" id="gdPct">0%</span>' +
          '</div>' +
          '<div class="gd-bar"><i id="gdBar"></i></div>' +
          '<div class="gd-prog-foot">' + money(contributed) + ' of ' + money(g.target) + '</div>' +
        '</div>' +

        '<div class="gd-card">' +
          '<div class="gd-card-title">Projected growth to your goal</div>' +
          '<div class="gd-chart-wrap"><canvas id="gdChart"></canvas></div>' +
        '</div>' +

        '<div class="gd-stats">' +
          '<div class="gd-stat"><div class="k">Monthly</div><div class="v">' + monthlyLabel + '</div></div>' +
          '<div class="gd-stat"><div class="k">Time to goal</div><div class="v">' + timeline + '</div></div>' +
          '<div class="gd-stat"><div class="k">Expected return</div><div class="v">' + Math.round(RATE * 100) + '%</div></div>' +
          '<div class="gd-stat"><div class="k">Est. completion</div><div class="v">' + completion + '</div></div>' +
        '</div>';

      foot.innerHTML = actionsHtml;

      // animate progress bar after paint
      requestAnimationFrame(function () {
        document.getElementById('gdBar').style.width = Math.max(2, pct) + '%';
        document.getElementById('gdPct').textContent = (pct < 1 ? '<1' : Math.round(pct)) + '%';
      });

      // simulator deep-link
      var simBtn = document.getElementById('simBtn');
      if (simBtn) {
        var params = new URLSearchParams();
        if (monthly > 0) params.set('monthly', monthly);
        if (years && isFinite(years)) params.set('years', Math.max(1, Math.round(years)));
        params.set('return', Math.round(RATE * 100));
        params.set('target', Math.round(g.target));
        if (g.name) params.set('name', g.name);
        simBtn.href = 'screen5.html?' + params.toString();
      }

      // ── projected growth chart ──
      var canvas = document.getElementById('gdChart');
      var ctx = canvas.getContext('2d');
      var dpr = window.devicePixelRatio || 1;
      function draw() {
        var wrap = canvas.parentElement;
        var w = wrap.clientWidth, h = wrap.clientHeight;
        canvas.width = w * dpr; canvas.height = h * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, w, h);

        var totalMonths = years && isFinite(years) ? Math.max(12, Math.round(years * 12)) : 360;
        var padB = 6, padT = 8;
        var maxV = monthly > 0 ? Math.max(g.target, fvAt(monthly, totalMonths)) : g.target;
        var N = 60;
        var pts = [];
        for (var i = 0; i <= N; i++) {
          var m = totalMonths * (i / N);
          var v = monthly > 0 ? fvAt(monthly, m) : (g.target * (i / N));
          pts.push(v);
        }
        var xOf = function (i) { return (i / N) * w; };
        var yOf = function (v) { return (h - padB) - (v / maxV) * (h - padB - padT); };

        // target line
        var ty = yOf(g.target);
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = 'rgba(25, 184, 166,0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, ty); ctx.lineTo(w, ty); ctx.stroke();
        ctx.setLineDash([]);

        // area fill
        var grad = ctx.createLinearGradient(0, padT, 0, h);
        grad.addColorStop(0, 'rgba(25, 184, 166,0.22)');
        grad.addColorStop(1, 'rgba(25, 184, 166,0)');
        ctx.beginPath();
        ctx.moveTo(0, h);
        for (var j = 0; j <= N; j++) ctx.lineTo(xOf(j), yOf(pts[j]));
        ctx.lineTo(w, h); ctx.closePath();
        ctx.fillStyle = grad; ctx.fill();

        // line
        ctx.beginPath();
        for (var k = 0; k <= N; k++) {
          var x = xOf(k), y = yOf(pts[k]);
          if (k === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = '#19b8a6'; ctx.lineWidth = 2.4; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
        ctx.stroke();
      }
      requestAnimationFrame(draw);
      window.addEventListener('resize', draw);
    })();
  </script>
</body>
</html>
